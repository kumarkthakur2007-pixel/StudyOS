      <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
        {subjects.map(s => (
          <button key={s.id} onClick={() => setActiveSubject(s.id)} style={{ padding:"6px 14px",borderRadius:99,fontSize:13,fontWeight:600,cursor:"pointer",border:`1px solid ${activeSubject===s.id?s.color+"60":"var(--border)"}`,background:activeSubject===s.id?s.color+"20":"var(--bg3)",color:activeSubject===s.id?s.color:"var(--text2)",transition:"all .2s" }}>{s.name}</button>
        ))}
      </div>
      {activeSubject && (
        <div className="card fade-up">
          <label className="label">Today's Note — {subjects.find(s => s.id===activeSubject)?.name}</label>
          <textarea className="notes-area" style={{ minHeight:180 }} placeholder="Write key points, doubts, formulas..." value={notes[activeSubject]?.[todayKey]||""} onChange={e => setNotes(prev => ({ ...prev, [activeSubject]:{ ...(prev[activeSubject]||{}), [todayKey]:e.target.value } }))}/>
        </div>
      )}
      {activeSubject && allDates.filter(d => d!==todayKey).length > 0 && (
        <div>
          <div className="section-title">Previous Notes</div>
          {allDates.filter(d => d!==todayKey).map(date => (
            <div key={date} className="card-sm" style={{ marginBottom:10,background:"var(--bg3)",borderRadius:12 }}>
              <div style={{ fontSize:11,color:"var(--text3)",fontWeight:600,marginBottom:6 }}>{new Date(date+"T00:00").toLocaleDateString("en-IN",{ weekday:"short",day:"numeric",month:"short" })}</div>
              <div style={{ fontSize:13,color:"var(--text2)",lineHeight:1.6,whiteSpace:"pre-wrap" }}>{notes[activeSubject][date]}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ANALYTICS PAGE ───────────────────────────────────────────────────────────
function AnalyticsPage({ habitLogs, habits, workoutLogs, lectureProgress, lectures, focusLogs, xp }) {
  const weekDays = getWeekDays();
  const habitData = weekDays.map(date => {
    const log = habitLogs[date]||{}; const done = habits.filter(h => log[h.id]).length;
    return { date, done, total:habits.length, pct:habits.length?Math.round(done/habits.length*100):0 };
  });
  const workoutData = weekDays.map(date => ({ date, done:!!workoutLogs[date]?.done }));
  const workoutStreak = getStreak(workoutLogs);
  const lectureData = weekDays.map(date => {
    const done = lectures.filter(l => lectureProgress[l.id]?.[date]?.done).length;
    return { date, done, total:lectures.length };
  });
  const last90 = getLast90();
  const totalSessions = Object.values(focusLogs||{}).reduce((s,d)=>s+(d.sessions||0),0);
  const totalDistractions = Object.values(focusLogs||{}).reduce((s,d)=>s+(d.distractions||0),0);
  const focusScore = totalSessions>0?Math.max(0,Math.round(100-(totalDistractions/totalSessions)*20)):0;
  const getHeat=(date)=>{
    const log=habitLogs[date]||{};const done=habits.filter(h=>log[h.id]).length;
    if(!habits.length||done===0)return 0;
    const p=done/habits.length;return p<.25?1:p<.5?2:p<.75?3:4;
  };
  const heatColors=["var(--bg4)","#10b98140","#10b98180","#10b981bb","#10b981"];
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="section-title"><Icon d={icons.analytics} size={16} stroke="var(--text2)"/> Analytics</div>
      <div className="grid-4 fade-up">
        {[
          {label:"Total XP",value:(xp||0).toLocaleString(),color:"var(--accent2)",icon:icons.star},
          {label:"Focus Score",value:`${focusScore}/100`,color:focusScore>=70?"var(--green)":focusScore>=40?"var(--amber)":"var(--red)",icon:icons.timer},
          {label:"Sessions",value:totalSessions,color:"var(--blue)",icon:icons.timer},
          {label:"Distractions",value:totalDistractions,color:"var(--red)",icon:icons.streak},
        ].map((s,i)=>(
          <div key={i} className="stat-card" style={{animationDelay:`${i*.04}s`}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><Icon d={s.icon} size={14} stroke={s.color}/><span style={{fontSize:9,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600}}>{s.label}</span></div>
            <div className="stat-value" style={{color:s.color,fontSize:18}}>{s.value}</div>
          </div>
        ))}
      </div>
      <div className="grid-3 fade-up">
        <div className="card" style={{ textAlign:"center" }}>
          <RingChart percent={habitData[6]?.pct||0} color="var(--green)" size={90}/>
          <div style={{ marginTop:12,fontFamily:"Syne",fontWeight:700,fontSize:14 }}>Habits Today</div>
          <div style={{ fontSize:12,color:"var(--text3)" }}>{habitData[6]?.done}/{habitData[6]?.total} done</div>
        </div>
        <div className="card" style={{ textAlign:"center" }}>
          <RingChart percent={lectures.length?Math.round((lectureData[6]?.done/lectures.length)*100):0} color="var(--blue)" size={90}/>
          <div style={{ marginTop:12,fontFamily:"Syne",fontWeight:700,fontSize:14 }}>Lectures Today</div>
          <div style={{ fontSize:12,color:"var(--text3)" }}>{lectureData[6]?.done}/{lectures.length} done</div>
        </div>
        <div className="card" style={{ textAlign:"center" }}>
          <RingChart percent={Math.min(100,workoutStreak*10)} color="var(--red)" size={90} sub="streak"/>
          <div style={{ marginTop:12,fontFamily:"Syne",fontWeight:700,fontSize:14 }}>Workout Streak</div>
          <div style={{ fontSize:12,color:"var(--text3)" }}>{workoutStreak} days</div>
        </div>
      </div>
      <div className="card fade-up" style={{ animationDelay:".1s" }}>
        <div className="section-title">Habit Completion — Last 7 Days<span style={{ marginLeft:"auto",fontSize:12,color:"var(--text3)",fontWeight:400 }}>{Math.round(habitData.reduce((s,d)=>s+d.pct,0)/7)}% avg</span></div>
        <div style={{ display:"flex",alignItems:"flex-end",gap:6,height:140,paddingBottom:20,paddingTop:20,position:"relative" }}>
          {habitData.map((d,i) => (
            <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:0,height:"100%",justifyContent:"flex-end" }}>
              <div style={{ fontSize:9,color:"var(--text3)",fontWeight:600,marginBottom:3,textAlign:"center" }}>{d.pct}%</div>
              <div style={{ width:"100%",height:`${Math.max(d.pct,2)}%`,maxHeight:"calc(100% - 36px)",background:d.pct===100?"var(--green)":d.pct>50?"var(--accent)":"var(--bg4)",borderRadius:"4px 4px 0 0",transition:"height 1s cubic-bezier(.16,1,.3,1)" }}/>
              <div style={{ fontSize:10,color:"var(--text3)",marginTop:4,textAlign:"center" }}>{new Date(d.date+"T00:00").toLocaleDateString("en",{ weekday:"narrow" })}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card fade-up" style={{ animationDelay:".15s" }}>
        <div className="section-title">Workout Heatmap — Last 7 Days</div>
        <div style={{ display:"flex",gap:8 }}>
          {workoutData.map((d,i) => (
            <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8 }}>
              <div style={{ width:"100%",aspectRatio:"1/1",borderRadius:8,background:d.done?"var(--green)":"var(--bg4)",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .3s" }}>
                {d.done && <Icon d={icons.check} size={16} stroke="#fff" strokeWidth={2.5}/>}
              </div>
              <div style={{ fontSize:10,color:"var(--text3)" }}>{new Date(d.date+"T00:00").toLocaleDateString("en",{ weekday:"narrow" })}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card fade-up" style={{ animationDelay:".2s" }}>
        <div className="section-title">Lectures Attended — Last 7 Days<span style={{ marginLeft:"auto",fontSize:12,color:"var(--text3)",fontWeight:400 }}>{weekDays.reduce((s,d)=>s+lectures.filter(l=>lectureProgress[l.id]?.[d]?.done).length,0)}/{weekDays.length*lectures.length} total</span></div>
        <div style={{ display:"flex",alignItems:"flex-end",gap:6,height:140,paddingBottom:20,paddingTop:20 }}>
          {lectureData.map((d,i) => (
            <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end" }}>
              <div style={{ fontSize:9,color:"var(--text3)",fontWeight:600,marginBottom:3,textAlign:"center" }}>{d.done}/{d.total}</div>
              <div style={{ width:"100%",height:d.total?`${Math.max((d.done/d.total)*100,d.done>0?2:0)}%`:"0%",maxHeight:"calc(100% - 36px)",background:"var(--blue)",borderRadius:"4px 4px 0 0",transition:"height 1s cubic-bezier(.16,1,.3,1)" }}/>
              <div style={{ fontSize:10,color:"var(--text3)",marginTop:4,textAlign:"center" }}>{new Date(d.date+"T00:00").toLocaleDateString("en",{ weekday:"narrow" })}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card fade-up" style={{animationDelay:".12s"}}>
        <div className="section-title">🔥 Study Heatmap — Last 90 Days</div>
        <div style={{overflowX:"auto",paddingBottom:8}}>
          <div style={{display:"flex",gap:12}}>
            {/* Day labels column */}
            <div style={{display:"flex",flexDirection:"column",gap:4,paddingTop:22,flexShrink:0}}>
              {["M","T","W","T","F","S","S"].map((d,i)=>(
                <div key={i} style={{height:18,fontSize:10,color:"var(--text3)",fontWeight:600,display:"flex",alignItems:"center"}}>{d}</div>
              ))}
            </div>
            {/* Weeks grid */}
            <div style={{display:"flex",flexDirection:"column",gap:0,overflowX:"auto"}}>
              {/* Month labels */}
              {(()=>{
                const startDay=new Date(last90[0]+"T00:00").getDay();
                const padded=[...Array(startDay).fill(null),...last90];
                const weeks=[];
                for(let w=0;w<Math.ceil(padded.length/7);w++) weeks.push(padded.slice(w*7,(w+1)*7));
                const monthLabels=[];
                let lastMonth=-1;
                weeks.forEach((week,wi)=>{
                  const firstReal=week.find(d=>d!==null);
                  if(firstReal){
                    const m=new Date(firstReal+"T00:00").getMonth();
                    if(m!==lastMonth){ monthLabels.push({wi,name:new Date(firstReal+"T00:00").toLocaleDateString("en",{month:"short"})}); lastMonth=m; }
                    else monthLabels.push(null);
                  } else monthLabels.push(null);
                });
                return (
                  <>
                    <div style={{display:"flex",gap:4,marginBottom:4,height:18}}>
                      {weeks.map((_,wi)=>(
                        <div key={wi} style={{width:18,fontSize:9,color:"var(--text3)",overflow:"hidden",flexShrink:0}}>
                          {monthLabels[wi]?.name||""}
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      {weeks.map((week,wi)=>(
                        <div key={wi} style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                          {Array.from({length:7}).map((_,di)=>{
                            const d=week[di];
                            const heat=d?getHeat(d):0;
                            return (
                              <div key={di} className="heatmap-cell"
                                title={d?`${d}: ${Math.round(heat/4*100)}% habit completion`:""}
                                style={{width:18,height:18,borderRadius:4,background:d?heatColors[heat]:"transparent",border:d?"1px solid rgba(255,255,255,0.04)":"none"}}
                              />
                            );
                          })}
                        </div>
                      ))}
                    </div>
                  </>
                );
              })()}
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:12,fontSize:11,color:"var(--text3)"}}>
          <span>Less</span>
          {heatColors.map((c,i)=><div key={i} style={{width:14,height:14,borderRadius:3,background:c,border:"1px solid rgba(255,255,255,0.06)"}}/>)}
          <span>More</span>
          <span style={{marginLeft:"auto",fontSize:10}}>Last 90 days of habit activity</span>
        </div>
      </div>
    </div>
  );
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function ProfilePage({ currentUser, profile, setProfile, habitLogs, habits, workoutLogs, lectureProgress, lectures, goals, xp }) {
  const [editing, setEditing]     = useState(false);
  const [form, setForm]           = useState({});
  const [avatarTab, setAvatarTab] = useState("emoji"); // "emoji" | "upload"
  const [saving, setSaving]       = useState(false);
  const [saveMsg, setSaveMsg]     = useState("");
  const fileRef  = useRef();

  // Populate form whenever profile (from IDB) changes
  useEffect(() => { setForm({ ...profile }); }, [profile]);

  // ── Helpers ──────────────────────────────────────────────────────────────────
  const handleImageUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (!file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setForm(f => ({ ...f, avatar: ev.target.result })); setAvatarTab("emoji"); };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const saveProfile = async () => {
    setSaving(true);
    const data = { ...form, _savedAt: new Date().toISOString() };
    await setProfile(data);
    setSaving(false);
    setSaveMsg("✅ Profile saved!");
    setTimeout(() => { setSaveMsg(""); setEditing(false); }, 1200);
  };

  // ── Stats ──────────────────────────────────────────────────────────────────
  const weekDays       = getWeekDays();
  const totalHabitDays = weekDays.filter(d => habits.some(h => habitLogs[d]?.[h.id])).length;
  const workoutStreak  = getStreak(workoutLogs);
  const goalsAvg       = goals.length ? Math.round(goals.reduce((s,g)=>s+g.progress,0)/goals.length) : 0;
  const lectureWeek    = weekDays.reduce((s,d)=>s+lectures.filter(l=>lectureProgress[l.id]?.[d]?.done).length,0);

  const AvatarPreview = ({ src, size=80 }) => {
    if (!src) return <Icon d={icons.user} size={size*0.5} stroke="var(--text3)"/>;
    if (src.startsWith("data:") || src.startsWith("http")) return <img src={src} alt="av" style={{width:"100%",height:"100%",objectFit:"cover"}}/>;
    return <span style={{fontSize:size*0.4}}>{src}</span>;
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* ── Hero ── */}
      <div className="profile-hero fade-up">
        <div className="profile-avatar-lg" style={{cursor:editing?"pointer":"default",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={() => editing && fileRef.current.click()}>
          <AvatarPreview src={form.avatar || profile.avatar} size={80}/>
        </div>
        <div style={{fontFamily:"Syne",fontSize:26,fontWeight:800,marginBottom:4}}>
          {profile.name || currentUser?.displayName || "Student"}
        </div>
        <div style={{color:"var(--text3)",fontSize:14,marginBottom:8}}>
          {[profile.class && `Class ${profile.class}`, profile.stream, profile.target].filter(Boolean).join(" • ")}
        </div>
        {profile.school && <div style={{fontSize:13,color:"var(--text2)",marginBottom:8}}>🏫 {profile.school}</div>}
        {profile.bio && <div style={{fontSize:13,color:"var(--text3)",fontStyle:"italic",marginBottom:12,lineHeight:1.6,maxWidth:400,margin:"0 auto 12px"}}>"{profile.bio}"</div>}

        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="btn btn-ghost btn-sm" onClick={() => { setForm({...profile}); setEditing(!editing); }}>
            <Icon d={icons.edit} size={14}/> {editing ? "Cancel" : "Edit Profile"}
          </button>
        </div>
      </div>

      {/* ── Edit Form ── */}
      {editing && (
        <div className="card fade-up" style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{fontFamily:"Syne",fontWeight:700,fontSize:15}}>✏️ Edit Your Profile</div>

          {/* Avatar editor */}
          <div style={{background:"var(--bg3)",borderRadius:14,padding:14,border:"1px solid var(--border)"}}>
            <div style={{fontSize:12,fontWeight:700,color:"var(--text3)",marginBottom:10,textTransform:"uppercase",letterSpacing:".5px"}}>Profile Picture</div>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
              <div style={{width:60,height:60,borderRadius:14,background:"var(--accentglow)",border:"2px solid var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
                <AvatarPreview src={form.avatar} size={60}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{form.name || "Your Name"}</div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{currentUser?.role==="owner"?"👑 Owner":"🛡️ Admin"}</div>
                {form.avatar && <button onClick={()=>setForm(f=>({...f,avatar:null}))} style={{marginTop:6,fontSize:10,color:"var(--red)",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:600}}>✕ Remove</button>}
              </div>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:10}}>
              {[{k:"emoji",l:"😀 Emoji"},{k:"upload",l:"📷 Upload"}].map(t=>(
                <button key={t.k} onClick={()=>setAvatarTab(t.k)} style={{flex:1,padding:"6px",borderRadius:8,border:`1px solid ${avatarTab===t.k?"var(--accent)":"var(--border)"}`,background:avatarTab===t.k?"var(--accentglow)":"var(--bg4)",cursor:"pointer",color:avatarTab===t.k?"var(--accent2)":"var(--text3)",fontSize:11,fontWeight:600}}>
                  {t.l}
                </button>
              ))}
            </div>
            {avatarTab==="emoji" && (
              <div style={{display:"flex",flexWrap:"wrap",gap:4,maxHeight:96,overflowY:"auto",padding:4,borderRadius:10,background:"var(--bg4)",border:"1px solid var(--border)"}}>
                {AVATAR_EMOJIS.map(em=>(
                  <button key={em} onClick={()=>setForm(f=>({...f,avatar:em}))}
                    style={{width:32,height:32,borderRadius:8,border:`1px solid ${form.avatar===em?"var(--accent)":"transparent"}`,background:form.avatar===em?"var(--accentglow)":"transparent",cursor:"pointer",fontSize:18,transition:"all .1s"}}>
                    {em}
                  </button>
                ))}
              </div>
            )}
            {avatarTab==="upload" && (
              <div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImageUpload}/>
                <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"10px",borderRadius:10,border:"2px dashed var(--border2)",background:"var(--bg4)",cursor:"pointer",color:"var(--text2)",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <Icon d={icons.upload} size={14} stroke="var(--text2)"/> Photo choose karo (max 2MB)
                </button>
              </div>
            )}
          </div>

          {/* Profile fields */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label className="label">Name *</label><input className="input" value={form.name||""} placeholder="Tumhara naam" onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
            <div><label className="label">School / Institute</label><input className="input" value={form.school||""} placeholder="School name" onChange={e=>setForm(f=>({...f,school:e.target.value}))}/></div>
            <div><label className="label">Class</label>
              <select className="input" value={form.class||"12"} onChange={e=>setForm(f=>({...f,class:e.target.value}))}>

              </select>

              <select className="input" value={form.stream||"PCB"} onChange={e=>setForm(f=>({...f,stream:e.target.value}))}>

              </select>
            </div>
            <div style={{gridColumn:"span 2"}}><label className="label">Target Exam</label>
              <select className="input" value={form.target||"NEET 2026"} onChange={e=>setForm(f=>({...f,target:e.target.value}))}>

            </div>
          </div>

          {saveMsg && <div style={{padding:"8px 12px",background:"#10b98118",border:"1px solid #10b98140",borderRadius:8,fontSize:12,color:"var(--green)",textAlign:"center"}}>{saveMsg}</div>}
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>setEditing(false)}>Cancel</button>
            <button className="btn btn-primary" style={{flex:2,justifyContent:"center"}} onClick={saveProfile} disabled={saving}>
              {saving ? "Saving..." : <><Icon d={icons.check} size={14} stroke="#fff"/> Save Profile</>}
            </button>
          </div>
        </div>
      )}

      {/* ── Stats ── */}
      <div className="grid-4 fade-up" style={{animationDelay:".05s"}}>
        {[
          {label:"Habit Days",    value:totalHabitDays+"/7", color:"var(--green)",  icon:icons.habits},
          {label:"Workout Streak",value:workoutStreak+"d",   color:"var(--red)",    icon:icons.fire},
          {label:"Lectures/Week", value:lectureWeek,         color:"var(--blue)",   icon:icons.lectures},
          {label:"Goal Progress", value:goalsAvg+"%",        color:"var(--accent2)",icon:icons.goals},
        ].map((s,i) => (
          <div key={i} className="stat-card">
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <Icon d={s.icon} size={16} stroke={s.color}/>
              <span style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600}}>{s.label}</span>
            </div>
            <div className="stat-value" style={{color:s.color,fontSize:22}}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* ── Goals ── */}
      <div className="card fade-up" style={{animationDelay:".1s"}}>
        <div className="section-title"><Icon d={icons.goals} size={15} stroke="var(--accent2)"/> Goal Progress</div>

        {goals.map(g => (
          <div key={g.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <span style={{fontSize:20}}>{g.emoji}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.title}</div>
              <div className="progress-bar"><div className="progress-fill" style={{width:`${g.progress}%`,background:"linear-gradient(90deg,var(--accent),var(--accent2))"}}/></div>
            </div>

          </div>
        ))}
      </div>
    </div>
  );
}

// ─── WEEKLY REPORT PAGE ───────────────────────────────────────────────────────
function WeeklyReportPage({ profile, habits, habitLogs, workoutLogs, lectureProgress, lectures, goals }) {
  const reportRef = useRef();
  const [generating, setGenerating] = useState(false);
  const [shareUrl, setShareUrl] = useState(null);
  const [shareModal, setShareModal] = useState(false);
  const weekDays = getWeekDays();
  const workoutStreak = getStreak(workoutLogs);
  const habitData = weekDays.map(d => ({ date:d, pct:habits.length?Math.round(habits.filter(h=>habitLogs[d]?.[h.id]).length/habits.length*100):0 }));
  const avgHabit = Math.round(habitData.reduce((s,d)=>s+d.pct,0)/7);
  const workoutDone = weekDays.filter(d => workoutLogs[d]?.done).length;
  const lectureDone = weekDays.reduce((s,d)=>s+lectures.filter(l=>lectureProgress[l.id]?.[d]?.done).length,0);
  const lectureTotal = weekDays.length * lectures.length;
  const goalsAvg = goals.length?Math.round(goals.reduce((s,g)=>s+g.progress,0)/goals.length):0;
  const weekLabel = `${new Date(weekDays[0]+"T00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short"})} – ${new Date(weekDays[6]+"T00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}`;
  const overallScore = Math.round((avgHabit*0.3)+(workoutDone/7*100*0.2)+(lectureTotal?lectureDone/lectureTotal*100*0.3:0)+(goalsAvg*0.2));
  const getGrade = (s) => s>=90?"S":s>=80?"A+":s>=70?"A":s>=60?"B+":s>=50?"B":s>=40?"C":"D";

  const generateImage = async () => {
    if (!window.html2canvas) { alert("html2canvas not loaded. Try again."); return; }

        </button>

      {/* REPORT CARD (capture target) */}

function SettingsPage({ currentUser, profile, setProfile, onLogout, theme, setTheme, allData, onImport }) {

  useEffect(() => { storage.set("settingsToggles", form); }, [form]);

  // Track last export date
  const lastExport = storage.get("lastExportDate", null);
  const daysSinceExport = lastExport
    ? Math.floor((Date.now() - new Date(lastExport).getTime()) / 864e5)
    : null;
  const showBackupWarning = daysSinceExport === null || daysSinceExport >= 7;

  const exportData = () => {
    const data = JSON.stringify(allData, null, 2);
    const blob = new Blob([data], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`StudyOS_backup_${today()}.json`; a.click();
    URL.revokeObjectURL(url);
    storage.set("lastExportDate", new Date().toISOString());
  };

  const handleImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setImportError(""); setImportOk(false);

      try {
        const data = JSON.parse(ev.target.result);
        onImport(data);
        setImportOk(true);
      } catch { setImportError("Invalid backup file. Please use a valid StudyOS JSON backup."); }

    e.target.value = "";

// ─── FOCUS MODE (POMODORO + DISTRACTION COUNTER) ────────────────────────────
function FocusPage({focusLogs,setFocusLogs}){
  const MODES=[{label:"25/5 Classic",work:25,rest:5},{label:"50/10 Deep Work",work:50,rest:10}];
  const [mi,setMi]=useState(0);
  const mode=MODES[mi];
  const [phase,setPhase]=useState("work");
  const [secs,setSecs]=useState(25*60);
  const [running,setRunning]=useState(false);
  const [sessions,setSessions]=useState(0);
  const [distractions,setDistractions]=useState(0);
  const tiRef=useRef(null);
  const todayKey=today();
  const total=phase==="work"?mode.work*60:mode.rest*60;
  const pct=(secs/total)*100;
  const R=110, circ=2*Math.PI*R;
  const offset=circ*((100-pct)/100);

  useEffect(()=>{
    setSecs((phase==="work"?mode.work:mode.rest)*60);
    setRunning(false); clearInterval(tiRef.current);
  },[mi,phase]);

  useEffect(()=>{
    if(running){
      tiRef.current=setInterval(()=>{

            return 0;
          }
          return s-1;
        });
      },1000);

    return ()=>clearInterval(tiRef.current);
  },[running,phase]);

  const mins=String(Math.floor(secs/60)).padStart(2,"0");

          <svg width={256} height={256}>
            <circle cx={128} cy={128} r={R} fill="none" stroke="var(--bg4)" strokeWidth="10"/>
            <circle cx={128} cy={128} r={R} fill="none" stroke={phase==="work"?"var(--accent)":"var(--green)"} strokeWidth="10"
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{transition:"stroke-dashoffset .95s linear",filter:`drop-shadow(0 0 10px ${phase==="work"?"var(--accent)":"var(--green)"})`}}/>
          </svg>
          <div className="pomo-center">

// CAPTCHA chars pool
const CAPTCHA_ALPHA = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
const CAPTCHA_DIGITS = "0123456789";
const CAPTCHA_SPECIAL = "@#₹&£€$π";

function generateCaptcha() {
  // 4 alpha + 2 digit + 3 special = 9 chars, then shuffle
  let chars = [];
  for (let i=0;i<4;i++) chars.push(CAPTCHA_ALPHA[Math.floor(Math.random()*CAPTCHA_ALPHA.length)]);
  for (let i=0;i<2;i++) chars.push(CAPTCHA_DIGITS[Math.floor(Math.random()*CAPTCHA_DIGITS.length)]);
  for (let i=0;i<3;i++) chars.push(CAPTCHA_SPECIAL[Math.floor(Math.random()*CAPTCHA_SPECIAL.length)]);
  // shuffle
  for (let i=chars.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [chars[i],chars[j]]=[chars[j],chars[i]]; }
  return chars.join("");
}

// ── Audio Engine ──────────────────────────────────────────────────────────────
const AlarmAudio = (() => {
  let ctx = null;
  let nodes = [];
  let customUrl = null;
  let customAudio = null;
  let ringing = false;

  const getCtx = () => {
    if (!ctx || ctx.state === "closed") ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  };

  const stop = () => {
    ringing = false;
    nodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch{} });
    nodes = [];
    if (customAudio) { customAudio.pause(); customAudio.currentTime = 0; }
  };

  // Gentle: soft piano + birds feel — sine waves fading in
  const playGentle = () => {
    stop(); ringing = true;
    const c = getCtx();
    const freqs = [261.63, 329.63, 392, 523.25]; // C4 E4 G4 C5 chord
    const playChord = () => {
      if (!ringing) return;
      freqs.forEach((f,i) => {
        const osc = c.createOscillator();
        const g = c.createGain();
        osc.type = "sine";
        osc.frequency.value = f;
        g.gain.setValueAtTime(0, c.currentTime);
        g.gain.linearRampToValueAtTime(0.08, c.currentTime + 0.5 + i*0.1);
        g.gain.linearRampToValueAtTime(0, c.currentTime + 2.5);
        osc.connect(g); g.connect(c.destination);
        osc.start(c.currentTime + i*0.08);
        osc.stop(c.currentTime + 2.8);
        nodes.push(osc);
      });
      // Also add bird chirp feel: random high freq bursts
      for (let b=0;b<3;b++) {
        const osc = c.createOscillator();
        const g = c.createGain();
        osc.type = "sine";
        osc.frequency.value = 2000 + Math.random()*1500;
        g.gain.setValueAtTime(0, c.currentTime + b*0.3);
        g.gain.linearRampToValueAtTime(0.04, c.currentTime + b*0.3 + 0.05);
        g.gain.linearRampToValueAtTime(0, c.currentTime + b*0.3 + 0.2);
        osc.connect(g); g.connect(c.destination);
        osc.start(c.currentTime + b*0.3);
        osc.stop(c.currentTime + b*0.3 + 0.3);
        nodes.push(osc);
      }
    };
    playChord();
    const interval = setInterval(() => { if (!ringing) { clearInterval(interval); return; } playChord(); }, 3200);
    nodes._interval = interval;
  };

  // Standard: classic digital beep
  const playStandard = () => {
    stop(); ringing = true;
    const c = getCtx();
    const beep = () => {
      if (!ringing) return;
      [0, 0.18, 0.36].forEach(delay => {
        const osc = c.createOscillator();
        const g = c.createGain();
        osc.type = "square";
        osc.frequency.value = 880;
        g.gain.setValueAtTime(0.15, c.currentTime + delay);
        g.gain.setValueAtTime(0, c.currentTime + delay + 0.14);
        osc.connect(g); g.connect(c.destination);
        osc.start(c.currentTime + delay);
        osc.stop(c.currentTime + delay + 0.15);
        nodes.push(osc);
      });
    };
    beep();
    const interval = setInterval(() => { if (!ringing) { clearInterval(interval); return; } beep(); }, 1200);
    nodes._interval = interval;
  };

  // Loud/Irritating: high pitch rapid fire
  const playLoud = () => {
    stop(); ringing = true;
    const c = getCtx();
    const annoying = () => {
      if (!ringing) return;
      const freqSeq = [1200, 1600, 1000, 1800, 900, 2000];
      freqSeq.forEach((f, i) => {
        const osc = c.createOscillator();
        const g = c.createGain();
        osc.type = "sawtooth";
        osc.frequency.value = f;
        g.gain.setValueAtTime(0.25, c.currentTime + i*0.08);
        g.gain.setValueAtTime(0, c.currentTime + i*0.08 + 0.07);
        osc.connect(g); g.connect(c.destination);
        osc.start(c.currentTime + i*0.08);
        osc.stop(c.currentTime + i*0.08 + 0.08);
        nodes.push(osc);
      });
    };
    annoying();
    const interval = setInterval(() => { if (!ringing) { clearInterval(interval); return; } annoying(); }, 700);
    nodes._interval = interval;
  };

  // Siren / Urgent: sweep up & down
  const playSiren = () => {
    stop(); ringing = true;
    const c = getCtx();
    const siren = () => {
      if (!ringing) return;
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(400, c.currentTime);
      osc.frequency.linearRampToValueAtTime(1600, c.currentTime + 0.6);
      osc.frequency.linearRampToValueAtTime(400, c.currentTime + 1.2);
      g.gain.setValueAtTime(0.3, c.currentTime);
      g.gain.linearRampToValueAtTime(0, c.currentTime + 1.3);
      osc.connect(g); g.connect(c.destination);
      osc.start(c.currentTime);
      osc.stop(c.currentTime + 1.3);
      nodes.push(osc);
    };
    siren();
    const interval = setInterval(() => { if (!ringing) { clearInterval(interval); return; } siren(); }, 1500);
    nodes._interval = interval;
  };

  // Custom: play uploaded audio on loop
  const playCustom = (dataUrl) => {
    stop(); ringing = true;
    try {
      // Convert base64 dataUrl → Blob → Object URL (more reliable on mobile)
      let audioSrc = dataUrl;
      if (dataUrl.startsWith("data:")) {
        const [header, b64] = dataUrl.split(",");
        const mime = header.match(/:(.*?);/)[1];
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const blob = new Blob([bytes], { type: mime });
        audioSrc = URL.createObjectURL(blob);
      }
      const audio = new Audio();
      audio.src = audioSrc;
      audio.loop = true;
      audio.volume = 0.9;
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(err => { console.warn("Custom audio play failed:", err); });
      }
      customAudio = audio;
    } catch(e) {
      console.warn("Custom audio error:", e);
    }
  };

  return { stop, playGentle, playStandard, playLoud, playSiren, playCustom, isRinging: () => ringing };
})();

      const triggered = storage.get("studyos_alarm_triggered", {});

      alarms.forEach(al => {
        if (!al.enabled) return;
        if (al.time !== timeStr) return;
        // Check day
        if (al.days && al.days.length > 0 && !al.days.includes(dayIdx)) return;
        // Deduplicate: only ring once per alarm per day
        const key = `${al.id}_${todayKey}`;
        if (triggered[key]) return;
        // Mark triggered
        triggered[key] = true;
        storage.set("studyos_alarm_triggered", triggered);
        // Ring!
        const newCaptcha = generateCaptcha();
        setCaptcha(newCaptcha);
        setCaptchaInput("");
        setCaptchaErr(false);
        setSnoozeCount(0);
        setRingData({ alarm: al });
        // Play sound
        playAlarmSound(al);
      });
    };
    check();
    tickRef.current = setInterval(check, 10000);
    return () => clearInterval(tickRef.current);
  }, [alarms]);

  const playAlarmSound = (al) => {
    if (al.type === "gentle")   AlarmAudio.playGentle();
    else if (al.type === "loud") AlarmAudio.playLoud();
    else if (al.type === "siren") AlarmAudio.playSiren();
    else if (al.type === "custom" && al.customAudio) AlarmAudio.playCustom(al.customAudio);
    else AlarmAudio.playStandard();
  };

  // Dismiss: validate CAPTCHA first
  const handleDismiss = () => {
    if (captchaInput !== captcha) {
      setCaptchaErr(true);
      // Shake and regenerate
      setTimeout(() => { setCaptcha(generateCaptcha()); setCaptchaInput(""); setCaptchaErr(false); }, 900);
      return;
    }
    AlarmAudio.stop();
    setRingData(null);
    setDismissed(true);
    setTimeout(() => setDismissed(false), 2000);
  };

  // Snooze: only allowed if CAPTCHA solved
  const handleSnooze = () => {
    if (captchaInput !== captcha) {
      setCaptchaErr(true);
      setTimeout(() => { setCaptcha(generateCaptcha()); setCaptchaInput(""); setCaptchaErr(false); }, 900);
      return;
    }
    AlarmAudio.stop();
    const snoozeMins = 5;
    const newCount = snoozeCount + 1;
    setSnoozeCount(newCount);
    // Re-ring after 5 mins
    const alarmCopy = { ...ringData.alarm };
    setRingData(null);
    setTimeout(() => {
      const nc = generateCaptcha();
      setCaptcha(nc); setCaptchaInput(""); setCaptchaErr(false);
      setRingData({ alarm: alarmCopy, snoozed: newCount });
      playAlarmSound(alarmCopy);
    }, snoozeMins * 60 * 1000);
  };

  // Custom audio upload
  const handleCustomFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (!file.type.startsWith("audio/")) { alert("Sirf audio file upload karo!"); return; }
    if (file.size > 5*1024*1024) { alert("File 5MB se chhoti honi chahiye."); return; }
    const reader = new FileReader();
    reader.onload = ev => setForm(f => ({ ...f, customAudio: ev.target.result, customName: file.name }));
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const testSound = () => {
    if (testing) { AlarmAudio.stop(); setTesting(false); return; }
    if (form.type === "custom" && !form.customAudio) return;
    setTesting(true);
    playAlarmSound({ type: form.type, customAudio: form.customAudio });
    setTimeout(() => { AlarmAudio.stop(); setTesting(false); }, 4000);
  };

  const saveAlarm = () => {
    if (!form.time) return;
    AlarmAudio.stop(); setTesting(false);
    const newAlarm = { ...form, id: Date.now().toString(), enabled: true };
    setAlarms(prev => [...prev, newAlarm]);
    setForm(blankForm);
    setShowAdd(false);
  };

  const toggleAlarm = (id) => setAlarms(prev => prev.map(a => a.id===id ? {...a, enabled:!a.enabled} : a));
  const deleteAlarm = (id) => setAlarms(prev => prev.filter(a => a.id!==id));

  const DAYS_LABEL = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const typeInfo = (id) => ALARM_TYPES.find(t=>t.id===id) || ALARM_TYPES[1];

  // ── Ringing Modal ──
  const RingingModal = () => {
    if (!ringData) return null;
    const ti = typeInfo(ringData.alarm.type);
    return (
      <div style={{position:"fixed",inset:0,zIndex:9998,background:"#00000095",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{
          background:"var(--bg2)",border:`2px solid ${ti.color}`,borderRadius:24,padding:28,
          maxWidth:360,width:"100%",textAlign:"center",
          boxShadow:`0 0 60px ${ti.color}60, 0 0 120px ${ti.color}20`,
          animation:"alarmPulse 1s ease-in-out infinite alternate"
        }}>
          <div style={{fontSize:64,marginBottom:8,animation:"alarmBounce .5s ease-in-out infinite alternate"}}>{ti.emoji}</div>
          <div style={{fontFamily:"Syne",fontSize:22,fontWeight:800,color:ti.color,marginBottom:4}}>
            {ringData.alarm.label || "Alarm!"}
          </div>
          {ringData.snoozed && <div style={{fontSize:12,color:"var(--text3)",marginBottom:4}}>Snoozed {ringData.snoozed}x</div>}
          <div style={{fontSize:36,fontFamily:"Syne",fontWeight:800,color:"var(--text)",marginBottom:4}}>
            {new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
          </div>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>{ti.label}</div>

          {/* CAPTCHA Box */}
          <div style={{background:"var(--bg3)",border:`1px solid ${captchaErr?"#ef4444":"var(--border)"}`,borderRadius:14,padding:16,marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",marginBottom:8,textTransform:"uppercase",letterSpacing:".5px"}}>
              🔐 CAPTCHA solve karo — tab hi band hoga
            </div>
            <div style={{
              fontFamily:"monospace",fontSize:28,fontWeight:800,letterSpacing:8,
              color:"var(--accent2)",marginBottom:12,
              background:"var(--bg4)",borderRadius:10,padding:"10px 16px",
              userSelect:"none",textDecoration:"line-through 2px var(--border2)",
              filter:"blur(0px)",
              transform:"skewX(-3deg)",
              display:"inline-block"
            }}>
              {captcha}
            </div>
            <input
              value={captchaInput}
              onChange={e=>{setCaptchaInput(e.target.value);setCaptchaErr(false);}}
              onKeyDown={e=>e.key==="Enter"&&handleDismiss()}
              placeholder="Yahan type karo..."
              style={{
                width:"100%",padding:"10px 14px",borderRadius:10,boxSizing:"border-box",
                border:`1.5px solid ${captchaErr?"#ef4444":captchaInput===captcha&&captchaInput?"#10b981":"var(--border2)"}`,
                background:"var(--bg)",color:"var(--text)",fontFamily:"monospace",fontSize:18,
                fontWeight:700,letterSpacing:4,outline:"none",textAlign:"center",
                transition:"border-color .2s"
              }}
              autoFocus
            />
            {captchaErr && <div style={{fontSize:11,color:"#ef4444",marginTop:6,fontWeight:700}}>❌ Galat! Dobara try karo...</div>}
            {captchaInput===captcha&&captchaInput && <div style={{fontSize:11,color:"#10b981",marginTop:6,fontWeight:700}}>✅ Sahi hai!</div>}
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={handleSnooze}
              style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid var(--border2)",background:"var(--bg3)",cursor:"pointer",color:"var(--text2)",fontFamily:"Syne",fontWeight:700,fontSize:13,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:20}}>😴</span>
              <span>Snooze 5m</span>
              <span style={{fontSize:10,color:"var(--text3)"}}>CAPTCHA chahiye</span>
            </button>
            <button onClick={handleDismiss}
              style={{flex:1,padding:"12px",borderRadius:12,border:`1px solid ${ti.color}60`,background:ti.color+"22",cursor:"pointer",color:ti.color,fontFamily:"Syne",fontWeight:700,fontSize:13,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:20}}>✅</span>
              <span>Band Karo</span>
              <span style={{fontSize:10,opacity:.7}}>CAPTCHA chahiye</span>
            </button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20,maxWidth:600,margin:"0 auto"}}>
      <style>{`
        @keyframes alarmPulse{from{box-shadow:0 0 40px var(--accentglow)}to{box-shadow:0 0 80px #ef444480}}
        @keyframes alarmBounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
      `}</style>

      {/* Dismissed flash */}
      {dismissed && (
        <div style={{position:"fixed",top:24,left:"50%",transform:"translateX(-50%)",background:"#10b981",color:"#fff",padding:"12px 24px",borderRadius:12,fontFamily:"Syne",fontWeight:700,fontSize:15,zIndex:9999,boxShadow:"0 4px 20px #10b98140"}}>
          ✅ Alarm band ho gaya! Good morning 🌅
        </div>
      )}

      <RingingModal/>

      {/* Header */}
      <div className="card fade-up" style={{padding:"20px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800}}>🚨 Alarm Center</div>
          <div style={{fontSize:12,color:"var(--text3)",marginTop:3}}>
            {alarms.filter(a=>a.enabled).length} active · CAPTCHA-locked dismissal
          </div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)} style={{gap:6}}>
          <Icon d={icons.plus} size={16}/> Naya Alarm
        </button>
      </div>

      {/* Alarm Type Guide */}
      <div className="card fade-up" style={{padding:"16px 18px",animationDelay:".04s"}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",marginBottom:12,textTransform:"uppercase",letterSpacing:".5px"}}>Alarm Types</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {ALARM_TYPES.map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,background:"var(--bg3)",border:`1px solid ${t.color}30`}}>
              <span style={{fontSize:22,flexShrink:0}}>{t.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:t.color}}>{t.label}</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>{t.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Alarm List */}
      {alarms.length === 0 ? (
        <div className="card" style={{textAlign:"center",padding:"40px 20px",animationDelay:".08s"}}>
          <div style={{fontSize:52,marginBottom:12}}>⏰</div>
          <div style={{fontFamily:"Syne",fontSize:16,fontWeight:700,marginBottom:6}}>Koi alarm set nahi hai</div>
          <div style={{fontSize:13,color:"var(--text3)"}}>Upar "+ Naya Alarm" pe click karo</div>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {alarms.map((al,i)=>{
            const ti = typeInfo(al.type);
            return (
              <div key={al.id} className="card fade-up" style={{padding:"16px 18px",animationDelay:`${i*.04}s`,opacity:al.enabled?1:.55,border:`1px solid ${al.enabled?ti.color+"40":"var(--border)"}`}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{fontSize:28}}>{ti.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontFamily:"Syne",fontSize:22,fontWeight:800,color:al.enabled?ti.color:"var(--text3)"}}>{al.time}</span>
                      {al.label && <span style={{fontSize:13,fontWeight:600,color:"var(--text2)"}}>{al.label}</span>}
                    </div>
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:3,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{padding:"1px 8px",borderRadius:99,background:ti.color+"20",color:ti.color,fontWeight:600,fontSize:10}}>{ti.label}</span>
                      {al.days&&al.days.length>0
                        ? al.days.map(d=><span key={d} style={{fontSize:10,padding:"1px 6px",borderRadius:6,background:"var(--bg4)",border:"1px solid var(--border)"}}>{DAYS_LABEL[d]}</span>)
                        : <span style={{fontSize:10,color:"var(--text3)"}}>Aaj sirf</span>
                      }
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {/* Toggle */}
                    <div onClick={()=>toggleAlarm(al.id)} style={{
                      width:40,height:22,borderRadius:11,background:al.enabled?ti.color:"var(--bg4)",
                      border:`1px solid ${al.enabled?ti.color:"var(--border)"}`,cursor:"pointer",position:"relative",transition:"background .2s,border .2s",flexShrink:0
                    }}>
                      <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:1,left:al.enabled?20:1,transition:"left .2s",boxShadow:"0 1px 4px #0004"}}/>
                    </div>
                    <button className="btn btn-icon btn-danger btn-sm" onClick={()=>deleteAlarm(al.id)}>
                      <Icon d={icons.trash} size={13} stroke="var(--red)"/>
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Add Alarm Modal */}
      {showAdd && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-title">⏰ Naya Alarm Set Karo</div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {/* Time */}
              <div>
                <label className="label">⏰ Time</label>
                <input type="time" className="input" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}
                  style={{fontFamily:"Syne",fontSize:22,fontWeight:800,letterSpacing:2}}/>
              </div>
              {/* Label */}
              <div>
                <label className="label">🏷️ Label (optional)</label>
                <input className="input" placeholder="e.g. Morning Study, School Bus..." value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))}/>
              </div>
              {/* Type */}
              <div>
                <label className="label">🔊 Alarm Type</label>
                <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:4}}>
                    {ALARM_TYPES.map(t=>(
                    <button key={t.id} onClick={()=>{AlarmAudio.stop();setTesting(false);setForm(f=>({...f,type:t.id}));}}
                      style={{padding:"10px 14px",borderRadius:10,border:`2px solid ${form.type===t.id?t.color:"var(--border)"}`,background:form.type===t.id?t.color+"18":"var(--bg3)",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left",transition:"all .15s"}}>
                      <span style={{fontSize:22,flexShrink:0}}>{t.emoji}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,color:form.type===t.id?t.color:"var(--text)"}}>{t.label}</div>
                        <div style={{fontSize:11,color:"var(--text3)"}}>{t.desc}</div>
                      </div>
                      {form.type===t.id && <div style={{width:8,height:8,borderRadius:"50%",background:t.color,flexShrink:0}}/>}
                    </button>
                  ))}
                </div>
              </div>
              {/* 🔊 Test Sound Button */}
              <button onClick={testSound}
                disabled={form.type==="custom" && !form.customAudio}
                style={{
                  width:"100%",padding:"11px",borderRadius:12,
                  border:`2px solid ${testing?"#ef4444":"var(--accent)"}`,
                  background:testing?"#ef444418":"var(--accentglow)",
                  cursor:"pointer",color:testing?"#ef4444":"var(--accent2)",
                  fontFamily:"Syne",fontWeight:700,fontSize:14,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:8,
                  transition:"all .2s",
                  opacity: form.type==="custom"&&!form.customAudio ? 0.4 : 1
                }}>
                {testing
                  ? <><span style={{fontSize:18,animation:"alarmBounce .4s ease-in-out infinite alternate"}}>🔊</span> Chal raha hai... (Stop)</>
                  : <><span style={{fontSize:18}}>▶️</span> Test Sound (4 sec preview)</>
                }
              </button>

              {/* Custom audio upload */}
              {form.type==="custom" && (
                <div>
                  <label className="label">🎵 Audio File Upload Karo</label>
                  <input ref={customFileRef} type="file" accept="audio/*" style={{display:"none"}} onChange={handleCustomFile}/>
                  <button onClick={()=>customFileRef.current.click()}
                    style={{width:"100%",padding:"10px",borderRadius:10,border:"2px dashed var(--border2)",background:"var(--bg4)",cursor:"pointer",color:"var(--text2)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    <Icon d={icons.upload} size={14}/> {form.customName || "Audio file choose karo (max 5MB)"}
                  </button>
                  <div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>MP3, WAV, OGG, M4A supported</div>
                </div>
              )}
              {/* Days */}
              <div>
                <label className="label">📅 Repeat Days (blank = aaj sirf)</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                  {DAYS_LABEL.map((d,i)=>(
                    <button key={i} onClick={()=>setForm(f=>({...f,days:f.days.includes(i)?f.days.filter(x=>x!==i):[...f.days,i]}))}
                      style={{padding:"6px 10px",borderRadius:8,border:`1.5px solid ${form.days.includes(i)?"var(--accent)":"var(--border)"}`,background:form.days.includes(i)?"var(--accentglow)":"var(--bg3)",cursor:"pointer",color:form.days.includes(i)?"var(--accent2)":"var(--text3)",fontSize:12,fontWeight:600,transition:"all .15s"}}>
                      {d}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{background:"#f97316" + "18",border:"1px solid #f9731640",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#f97316",fontWeight:600,lineHeight:1.6}}>
                🔐 Yaad raho: CAPTCHA (4 alpha + 2 digit + 3 special) solve kiye bina alarm band nahi hoga. Na dismiss, na snooze!
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>{setShowAdd(false);setForm(blankForm);AlarmAudio.stop();setTesting(false);}}>Cancel</button>
              <button className="btn btn-primary" style={{flex:2,justifyContent:"center"}} onClick={saveAlarm}
                disabled={form.type==="custom"&&!form.customAudio}>
                ⏰ Alarm Set Karo
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(null);
  const [showCredModal, setShowCredModal] = useState(false);
  const [userAvatar, setUserAvatar] = useState(null); // per-user avatar (loaded from IDB)
  const [userProfile, setUserProfile] = useState({}); // per-user full profile (IDB)
  const [profileLoading, setProfileLoading] = useState(false);
  // "profile" is kept as a shared fallback for owner's onboarding data & legacy compat
  const [onboarded, setOnboarded] = useState(() => storage.get("onboarded",false));
  const [profile, setProfileLegacy] = useState(() => storage.get("profile",{}));
  const [page, setPage] = useState("home");
  const [sidebarOpen, setSidebarOpen] = useState(false); // mobile
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => storage.get("sidebarCollapsed",false)); // desktop
  const [theme, setTheme] = useState(() => {
    const saved = storage.get("theme", null);
    if (saved && THEMES[saved]) return saved;
    // Auto-detect system theme on first launch
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark_purple";
  });
  const [habits, setHabits] = useState(() => storage.get("habits",INITIAL_HABITS));
  const [habitLogs, setHabitLogs] = useState(() => storage.get("habitLogs",{}));
  const [lectures, setLectures] = useState(() => storage.get("lectures",INITIAL_LECTURES));
  const [lectureProgress, setLectureProgress] = useState(() => storage.get("lectureProgress",{}));
  const [notes, setNotes] = useState(() => storage.get("notes",{}));
  const [exercises, setExercises] = useState(() => storage.get("exercises",INITIAL_WORKOUTS));
  const [workoutLogs, setWorkoutLogs] = useState(() => storage.get("workoutLogs",{}));
  const [goals, setGoals] = useState(() => storage.get("goals",INITIAL_GOALS));
  const [flashcards, setFlashcards] = useState(() => storage.get("flashcards",[]));
  const [focusLogs, setFocusLogs] = useState(() => storage.get("focusLogs",{}));
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);

  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener("resize",fn); return () => window.removeEventListener("resize",fn);
  },[]);

  // Load per-user profile (incl. avatar) from IndexedDB whenever login changes
  useEffect(() => {
    if (!currentUser?.id) { setUserAvatar(null); setUserProfile({}); return; }
    setProfileLoading(true);
    getUserProfile(currentUser.id, (p) => {
      setUserProfile(p || {});
      setUserAvatar((p && p.avatar) || null);
      setProfileLoading(false);
    });
  },[currentUser]);

  useEffect(() => { storage.set("habits",habits); },[habits]);
  useEffect(() => { storage.set("habitLogs",habitLogs); },[habitLogs]);
  useEffect(() => { storage.set("lectures",lectures); },[lectures]);
  useEffect(() => { storage.set("lectureProgress",lectureProgress); },[lectureProgress]);
  useEffect(() => { storage.set("notes",notes); },[notes]);
  useEffect(() => { storage.set("exercises",exercises); },[exercises]);
  useEffect(() => { storage.set("workoutLogs",workoutLogs); },[workoutLogs]);
  useEffect(() => { storage.set("goals",goals); },[goals]);
  useEffect(() => { storage.set("flashcards",flashcards); },[flashcards]);
  useEffect(() => { storage.set("focusLogs",focusLogs); },[focusLogs]);
  useEffect(() => { storage.set("profile",profile); },[profile]);

  // Unified setProfile — saves to IndexedDB (per-user) + legacy localStorage
  const setProfile = (data) => {
    setProfileLegacy(data); // legacy (owner onboarding, WeeklyReport compat)
    if (currentUser?.id) {
      const merged = { ...userProfile, ...data };
      setUserProfile(merged);
      setUserAvatar(merged.avatar || null);
      saveUserProfile(currentUser.id, merged);
    }
  };
  useEffect(() => { storage.set("theme",theme); },[theme]);
  useEffect(() => { storage.set("sidebarCollapsed",sidebarCollapsed); },[sidebarCollapsed]);

  const handleThemeChange = (t) => { setTheme(t); };

  const handleOnboardComplete = (data) => {
    setProfileLegacy(data);
    storage.set("onboarded",true);
    setOnboarded(true);
    if (currentUser?.id) {
      const merged = { ...userProfile, ...data };
      setUserProfile(merged);
      setUserAvatar(merged.avatar || null);
      saveUserProfile(currentUser.id, merged);
    }
  };
  const handleLogout = () => {
    // Preserve auth and sessions — only reset data
    const authBackup = storage.get("studyos_auth", null);
    const sessBackup = storage.get("studyos_sessions", null);
    localStorage.clear();
    if (authBackup) storage.set("studyos_auth", authBackup);
    if (sessBackup) storage.set("studyos_sessions", sessBackup);
    storage.set("onboarded", false);
    setOnboarded(false); setProfileLegacy({}); setUserProfile({}); setUserAvatar(null);
    setHabits(INITIAL_HABITS); setHabitLogs({}); setLectures(INITIAL_LECTURES);
    setLectureProgress({}); setNotes({}); setExercises(INITIAL_WORKOUTS);
    setWorkoutLogs({}); setGoals(INITIAL_GOALS); setFlashcards([]); setFocusLogs({}); setTheme("dark_purple");
    setLoggedIn(false); setCurrentUser(null);
  };
  const handleSessionLogout = () => { setLoggedIn(false); setCurrentUser(null); };

  const allData = {
    _version: 3,
    _exportedAt: new Date().toISOString(),
    _exportedBy: currentUser?.username || "unknown",
    profile, habits, habitLogs, lectures, lectureProgress,
    notes, exercises, workoutLogs, goals, flashcards, focusLogs,
    theme,
    onboarded: true,
    auth: storage.get("studyos_auth", null),
  };
  const xp = useMemo(()=>computeXP(habitLogs,habits,workoutLogs,lectureProgress,lectures),[habitLogs,habits,workoutLogs,lectureProgress,lectures]);
  const handleImport = (data) => {
    if (data.profile) { setProfile(data.profile); storage.set("profile",data.profile); }
    if (data.habits) { setHabits(data.habits); storage.set("habits",data.habits); }
    if (data.habitLogs) { setHabitLogs(data.habitLogs); storage.set("habitLogs",data.habitLogs); }
    if (data.lectures) { setLectures(data.lectures); storage.set("lectures",data.lectures); }
    if (data.lectureProgress) { setLectureProgress(data.lectureProgress); storage.set("lectureProgress",data.lectureProgress); }
    if (data.notes) { setNotes(data.notes); storage.set("notes",data.notes); }
    if (data.exercises) { setExercises(data.exercises); storage.set("exercises",data.exercises); }
    if (data.workoutLogs) { setWorkoutLogs(data.workoutLogs); storage.set("workoutLogs",data.workoutLogs); }
    if (data.goals) { setGoals(data.goals); storage.set("goals",data.goals); }
    if (data.flashcards) { setFlashcards(data.flashcards); storage.set("flashcards",data.flashcards); }
    if (data.focusLogs) { setFocusLogs(data.focusLogs); storage.set("focusLogs",data.focusLogs); }
    if (data.theme && THEMES[data.theme]) { setTheme(data.theme); storage.set("theme",data.theme); }
    if (data.auth) { storage.set("studyos_auth", data.auth); }
    if (data.onboarded !== undefined) { storage.set("onboarded", data.onboarded); }
  };

  const ALL_NAV = [
    { id:"home",     label:"Dashboard",   icon:"home",     alwaysShow:true },
    { id:"schedule", label:"Schedule",    icon:"schedule"  },
    { id:"habits",   label:"Habits",      icon:"habits"    },
    { id:"lectures", label:"Lectures",    icon:"lectures"  },
    { id:"workout",  label:"Workout",     icon:"workout"   },
    { id:"goals",    label:"Goals",       icon:"goals"     },
    { id:"notes",    label:"Notes",       icon:"notes"     },
    { id:"analytics",label:"Analytics",   icon:"analytics" },
    { id:"profile",  label:"Profile",     icon:"profile",  alwaysShow:true },
    { id:"focus",    label:"Focus Mode",  icon:"timer"     },
    { id:"revision", label:"Revision Lab",icon:"star"      },
    { id:"report",   label:"Weekly Report",icon:"report"   },
    { id:"admin",    label:"Admin Manager",icon:"profile",  ownerOnly:true },
    { id:"settings", label:"Settings",    icon:"settings"  },
    { id:"alarm",    label:"Alarm",        icon:"alarm"     },
  ];
  // Owner sees all; Admin sees only permitted pages + always-show pages
  const navItems = ALL_NAV.filter(item =>
    currentUser?.role === "owner"
      ? true
      : !item.ownerOnly && (item.alwaysShow || hasPermission(currentUser, item.id))
  );
  const pageTitles = { home:"Dashboard",schedule:"Schedule",habits:"Habits",lectures:"Lectures",workout:"Workout",goals:"Goals",notes:"Notes",analytics:"Analytics",profile:"Profile",focus:"Focus Mode",revision:"Revision Lab",report:"Weekly Report",admin:"Admin Manager",settings:"Settings",alarm:"⏰ Alarm" };

  const navigateTo = (id) => {
    // Prevent admin from navigating to pages they don't have access to
    if (currentUser?.role !== "owner" && !["home","profile"].includes(id) && !hasPermission(currentUser, id)) return;
    setPage(id); setSidebarOpen(false);
  };

  if (!loggedIn) return <><style>{getCSS(theme)}</style><LoginScreen onLogin={(user)=>{setLoggedIn(true);setCurrentUser(user);}}/></>;
  if (!onboarded) return <><style>{getCSS(theme)}</style><Onboarding onComplete={handleOnboardComplete}/></>;
  const mobileNav = [
    {id:"home",label:"Home",icon:"home"},
    {id:"habits",label:"Habits",icon:"habits"},
    {id:"focus",label:"Focus",icon:"timer"},
    {id:"revision",label:"Revision",icon:"star"},
    {id:"analytics",label:"Stats",icon:"analytics"},
  ].filter(item => currentUser?.role==="owner" || ["home"].includes(item.id) || hasPermission(currentUser, item.id));

  return (
    <>
      <style>{getCSS(theme)}</style>
      <div className="app">
        {/* Mobile overlay */}
        <div className={`sidebar-overlay ${isMobile && sidebarOpen?"visible":""}`} onClick={() => setSidebarOpen(false)}/>

        {/* Sidebar */}
        <div className={`sidebar ${!isMobile && sidebarCollapsed?"collapsed":""} ${isMobile && sidebarOpen?"mobile-open":""}`}>
          <div className="sidebar-header">
            <div className="sidebar-logo"><Icon d={icons.brain} size={18} stroke="#fff"/></div>
            <div className="sidebar-title">StudyOS</div>
            {/* Desktop collapse btn */}
            {!isMobile && (
              <button onClick={() => setSidebarCollapsed(c => !c)} style={{ display:"flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer",color:"var(--text3)",flexShrink:0,transition:"all .2s" }}>
                <Icon d={sidebarCollapsed ? icons.chevronRight : icons.chevronLeft} size={14} stroke="currentColor"/>
              </button>
            )}
            {/* Mobile close btn */}
            {isMobile && (
              <button className="sidebar-close-btn" onClick={() => setSidebarOpen(false)}>
                <Icon d={icons.close} size={18} stroke="currentColor"/>
              </button>
            )}
          </div>
          <nav className="sidebar-nav">
            {navItems.map(item => (
              <div key={item.id} className={`nav-item ${page===item.id?"active":""}`} onClick={() => navigateTo(item.id)} title={!isMobile && sidebarCollapsed ? item.label : ""}>
                <div className="nav-icon"><Icon d={icons[item.icon]} size={18} stroke="currentColor"/></div>
                <span className="nav-label">{item.label}</span>
              </div>
            ))}
          </nav>
          <div className="sidebar-footer">
            <div className="profile-mini" onClick={() => navigateTo("profile")}>
              <div className="profile-avatar" style={{overflow:"hidden"}}>
                {userAvatar
                  ? (userAvatar.startsWith("data:") || userAvatar.startsWith("http")
                      ? <img src={userAvatar} alt="av" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"inherit"}}/>
                      : <span style={{fontSize:18}}>{userAvatar}</span>)
                  : <Icon d={icons.user} size={18} stroke="var(--text3)"/>
                }
              </div>
              <div className="profile-info">
                <div className="profile-name">{userProfile?.name || currentUser?.displayName || "Student"}</div>
                <div className="profile-sub">{currentUser?.role==="owner"?"👑 Owner":"🛡️ Admin"}</div>
              </div>
            </div>
            {currentUser?.role==="owner" && (
              <div style={{padding:"0 12px 8px"}}>
                <button onClick={()=>navigateTo("admin")}
                  style={{width:"100%",padding:"8px",borderRadius:10,border:"1px solid #7c6fff40",background:"var(--accentglow)",cursor:"pointer",color:"var(--accent2)",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:7,transition:"all .2s"}}>
                  <span style={{fontSize:14}}>🛡️</span>
                  <span className="nav-label">Admin Manager</span>
                </button>
              </div>
            )}
            <div style={{display:"flex",gap:6,padding:"0 12px 12px"}}>
              <button onClick={()=>setShowCredModal(true)} title="Change Credentials" style={{flex:1,padding:"7px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer",color:"var(--text3)",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                <Icon d={icons.edit} size={12}/><span className="nav-label">Password</span>
              </button>
              <button onClick={handleSessionLogout} title="Logout" style={{flex:1,padding:"7px",borderRadius:8,border:"1px solid #ef444430",background:"#ef444412",cursor:"pointer",color:"var(--red)",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                <Icon d={icons.x} size={12} stroke="var(--red)"/><span className="nav-label">Logout</span>
              </button>
            </div>
          </div>
        </div>

        {/* Main */}
        <div className="main">
          <div className="topbar">
            <div className="topbar-left">
              <div className="icon-btn" onClick={() => isMobile ? setSidebarOpen(o=>!o) : setSidebarCollapsed(c=>!c)}>
                <Icon d={icons.menu} size={17} stroke="currentColor"/>
              </div>
              <div className="page-title">{pageTitles[page]}</div>
            </div>
            <div className="topbar-right">
              <div className="topbar-date" style={{ display:window.innerWidth<480?"none":"flex" }}>{todayLabel()}</div>
              <div className="streak-badge" style={{ fontSize:12,padding:"4px 10px" }}>
                <Icon d={icons.fire} size={13} stroke="var(--red)" fill="var(--red)"/> {getStreak(workoutLogs)}d
              </div>
              {/* Theme quick toggle */}
              <div className="icon-btn" onClick={() => {
                const keys=Object.keys(THEMES); const i=keys.indexOf(theme); handleThemeChange(keys[(i+1)%keys.length]);
              }} title="Switch Theme" style={{ fontSize:16 }}>
                {THEMES[theme]?.emoji||"🌙"}
              </div>
            </div>
          </div>
          <div className="content" key={page}>
            {/* Permission block for non-owner */}
            {currentUser?.role!=="owner" && !["home","profile"].includes(page) && !hasPermission(currentUser,page) ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16,textAlign:"center",padding:24}}>
                <div style={{fontSize:56}}>🔒</div>
                <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800}}>Access Denied</div>
                <div style={{color:"var(--text3)",fontSize:14,maxWidth:300}}>The Owner has not granted access to this page. Please request permission from the Owner.</div>
                <button className="btn btn-ghost" onClick={()=>navigateTo("home")}>← Back to Dashboard</button>
              </div>
            ) : (
              <>
            {page==="home" && <HomePage profile={userProfile} habits={habits} habitLogs={habitLogs} setHabitLogs={setHabitLogs} lectures={lectures} lectureProgress={lectureProgress} workoutLogs={workoutLogs} goals={goals} xp={xp} onNavigate={id=>setPage(id)}/>}
            {page==="schedule" && <SchedulePage/>}
            {page==="habits" && <HabitsPage habits={habits} setHabits={setHabits} habitLogs={habitLogs} setHabitLogs={setHabitLogs}/>}
            {page==="lectures" && <LecturesPage lectures={lectures} setLectures={setLectures} lectureProgress={lectureProgress} setLectureProgress={setLectureProgress} notes={notes} setNotes={setNotes}/>}
            {page==="workout" && <WorkoutPage exercises={exercises} setExercises={setExercises} workoutLogs={workoutLogs} setWorkoutLogs={setWorkoutLogs}/>}
            {page==="goals" && <GoalsPage goals={goals} setGoals={setGoals}/>}
            {page==="notes" && <NotesPage notes={notes} setNotes={setNotes} lectures={lectures}/>}
            {page==="analytics" && <AnalyticsPage habitLogs={habitLogs} habits={habits} workoutLogs={workoutLogs} lectureProgress={lectureProgress} lectures={lectures} focusLogs={focusLogs} xp={xp}/>}
            {page==="focus" && <FocusPage focusLogs={focusLogs} setFocusLogs={setFocusLogs}/>}
            {page==="revision" && <RevisionPage flashcards={flashcards} setFlashcards={setFlashcards}/>}
            {page==="profile" && <ProfilePage currentUser={currentUser} profile={userProfile} setProfile={setProfile} habitLogs={habitLogs} habits={habits} workoutLogs={workoutLogs} lectureProgress={lectureProgress} lectures={lectures} goals={goals} xp={xp}/>}
            {page==="report" && <WeeklyReportPage profile={userProfile} habits={habits} habitLogs={habitLogs} workoutLogs={workoutLogs} lectureProgress={lectureProgress} lectures={lectures} goals={goals}/>}
            {page==="admin" && currentUser?.role==="owner" && <AdminPage onSessionLogout={handleSessionLogout} onFullLogout={handleLogout} allData={allData} onImport={handleImport}/>}
            {page==="settings" && <SettingsPage currentUser={currentUser} profile={userProfile} setProfile={setProfile} onLogout={handleLogout} theme={theme} setTheme={handleThemeChange} allData={allData} onImport={handleImport}/>}
            {page==="alarm" && <AlarmPage/>}
              </>
            )}
          </div>
        </div>
      </div>
      {/* Mobile Bottom Nav */}
      <div className="bottom-nav">
        <div className="bn-inner">
          {mobileNav.map(item=>(
            <div key={item.id} className={`bn-item ${page===item.id?"active":""}`} onClick={()=>{setPage(item.id);setSidebarOpen(false);}}>
              <Icon d={icons[item.icon]} size={20} stroke="currentColor"/>
              <div className="bn-label">{item.label}</div>
            </div>
          ))}
        </div>
      </div>
      {showCredModal && currentUser && <ChangeCredentialsModal currentUser={currentUser} onClose={()=>setShowCredModal(false)} onAvatarChange={(av)=>setUserAvatar(av)}/>}
    </>
  );
}

const bootEl = document.getElementById("boot-screen");
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
// Cancel the watchdog timer — app is rendering
if(typeof window._appReady === 'function') window._appReady();
if(bootEl) setTimeout(()=>{ bootEl.style.transition="opacity .4s"; bootEl.style.opacity="0"; setTimeout(()=>bootEl.remove(),400); },300);
  
</script>
</body>
</html>
