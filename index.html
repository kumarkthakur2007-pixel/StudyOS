  <script>
    function _bootErr(msg) {
      var e = document.getElementById('boot-err');

      var s = document.getElementById('boot-spinner');

  <script>
    var _appRenderTimeout = setTimeout(function() {
      var root = document.getElementById('root');

      if(root && !root.hasChildNodes() && bootScreen && bootScreen.parentNode) {

          _bootErr('❌ Scripts load nahi hue. Internet slow hai ya CDN block hai.\nWifi ya 4G/5G se try karo.');

          _bootErr('❌ App start nahi hua. Page reload karo. Agar phir bhi nahi chala toh cache clear karo (Ctrl+Shift+R).');

      }
    }, 15000);
    // App successfully render hone par timeout cancel karo
    window._appReady = function() { clearTimeout(_appRenderTimeout); };
  </script>

const getRank=(xp)=>{ let r=RANKS[0]; for(const rk of RANKS){if(xp>=rk.minXP)r=rk;else break;} return r; };
const getNextRank=(xp)=>{ for(const r of RANKS){if(xp<r.minXP)return r;} return null; };
const computeXP=(habitLogs,habits,workoutLogs,lectureProgress,lectures)=>{
  let xp=0;
  Object.values(habitLogs).forEach(dl=>{ habits.forEach(h=>{ if(dl[h.id])xp+=XP_VALS.habit; }); });
  Object.values(workoutLogs).forEach(l=>{ if(l?.done)xp+=XP_VALS.workout; });
  lectures.forEach(l=>{ Object.values(lectureProgress[l.id]||{}).forEach(d=>{ if(d?.done)xp+=XP_VALS.lecture; }); });
  return xp;
};

const storage = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

// ─── PER-USER PROFILE SYSTEM ─────────────────────────────────────────────────
// Each user (owner + every admin) has their own independent profile stored in
// IndexedDB. Avatar (image/emoji) is stored alongside other profile fields.
// Optionally, a File System Access API "linked file" can be used to persist
// the profile as a real JSON file on the device.
//
// Storage layout — IndexedDB "studyos_profiles" DB, object store "profiles":
//   key  = userId  (e.g. "owner", "adm_1234567890")
//   value = { name, bio, school, class, stream, target, avatar, ... }
//
// File System Access API — optional per-user file handle stored in IDB store


const AVATAR_EMOJIS = ["🧑‍💻","👨‍🎓","👩‍🎓","🦸","🧠","🔥","⚡","🎯","🏆","👑","🦊","🐯","🦁","🐼","🐸","🐺","🦅","🌟","💎","🚀","🎮","🎸","🏋️","🥷","🧬","⚔️","🛡️","🌙","☀️","🌈"];

const ProfileDB = (() => {
  const DB_NAME  = "studyos_profiles";
  const PROFILES = "profiles";
  const VERSION  = 1;
  let _db = null;

  const open = () => new Promise((res, rej) => {
    if (_db) { res(_db); return; }
    const req = indexedDB.open(DB_NAME, VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(PROFILES)) db.createObjectStore(PROFILES);
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror   = e => rej(e.target.error);
  });

  const tx = async (store, mode, fn) => {
    const db = await open();
    return new Promise((res, rej) => {
      const t = db.transaction(store, mode);
      const s = t.objectStore(store);
      const r = fn(s);
      r.onsuccess = () => res(r.result ?? null);
      r.onerror   = () => rej(r.error);
    });
  };

  return {
    getProfile: async (userId) => {
      try { return await tx(PROFILES, "readonly", s => s.get(userId)); }
      catch { return null; }
    },
    setProfile: async (userId, data) => {
      try { return await tx(PROFILES, "readwrite", s => s.put(data, userId)); }
      catch { return false; }
    },
  };
})();

// ── Helpers called from components ────────────────────────────────────────────
const getUserProfile = (userId, cb) => {
  ProfileDB.getProfile(userId).then(p => cb(p || {})).catch(() => cb({}));
};
const saveUserProfile = (userId, data) => ProfileDB.setProfile(userId, data);

// Backward-compat avatar wrappers used in existing components
const getUserAvatar = (userId, cb) => {
  ProfileDB.getProfile(userId).then(p => cb((p && p.avatar) || null)).catch(() => cb(null));
};
const setUserAvatar = async (userId, avatarVal) => {
  const existing = await ProfileDB.getProfile(userId) || {};
  return ProfileDB.setProfile(userId, { ...existing, avatar: avatarVal });
};

function getOwnerLoginsToday() {
  const todayKey = new Date().toISOString().split("T")[0];
  return getSessions()[todayKey] || 0;
}
function recordOwnerLogin() {
  const s = getSessions();
  const todayKey = new Date().toISOString().split("T")[0];
  s[todayKey] = (s[todayKey] || 0) + 1;
  setSessions(s);
}
// Check if admin has a permission (owner always has all)
function hasPermission(currentUser, page) {
  if (!currentUser) return false;
  if (currentUser.role === "owner") return true;
  return (currentUser.permissions || []).includes(page);
}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [showPass, setShowPass] = useState(false);
  const [importMsg, setImportMsg] = useState("");
  const [importErr, setImportErr] = useState("");
  const importRef = useRef();

  const handleLogin = () => {
    setError(""); setLoading(true);
    setTimeout(() => {
      const auth = getAuth();
      // Owner check
      if (username === auth.owner.username && password === auth.owner.password) {
        if (getOwnerLoginsToday() >= MAX_OWNER_LOGINS_PER_DAY) {
          setError(`Owner login limit reached! Only ${MAX_OWNER_LOGINS_PER_DAY} logins allowed for today. Please try again tomorrow. 🔒`);
          setLoading(false); return;
        }
        recordOwnerLogin();
        onLogin({ role:"owner", username:auth.owner.username, id:"owner", permissions: ALL_PERMISSIONS.map(p=>p.key) });
        return;
      }
      // Admin check
      const admin = (auth.admins||[]).find(a => a.active && a.username === username && a.password === password);
      if (admin) {
        onLogin({ role:"admin", username:admin.username, displayName:admin.displayName, id:admin.id, permissions:admin.permissions||[] });
        return;
      }
      setError("Incorrect username or password. Please try again. ❌");
      setPassword("");
      setLoading(false);
    }, 600);
  };

  const handleImportBackup = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setImportErr(""); setImportMsg("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const keys = ["profile","habits","habitLogs","lectures","lectureProgress","notes","exercises","workoutLogs","goals","flashcards","focusLogs","theme"];
        keys.forEach(k => { if (data[k] !== undefined) localStorage.setItem(k, JSON.stringify(data[k])); });
        if (data.auth) localStorage.setItem("studyos_auth", JSON.stringify(data.auth));
        if (data.onboarded !== undefined) localStorage.setItem("onboarded", JSON.stringify(data.onboarded));
        setImportMsg("✅ Backup restored! Page reload ho raha hai...");
        setTimeout(() => window.location.reload(), 1500);
      } catch { setImportErr("❌ Invalid file. Sirf StudyOS backup (.json) use karein."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:"32px 24px",boxSizing:"border-box"}}>
      <div style={{width:"100%",maxWidth:420,animation:"fadeUp .5s cubic-bezier(.16,1,.3,1)",paddingBottom:24}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:72,height:72,borderRadius:20,background:"linear-gradient(135deg,var(--accent),var(--pink))",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 8px 32px var(--accentglow)"}}>
            <Icon d={icons.brain} size={30} stroke="#fff"/>
          </div>
          <div style={{fontFamily:"Syne",fontSize:26,fontWeight:800,marginBottom:4}}>StudyOS</div>
          <div style={{color:"var(--text3)",fontSize:13}}>Command Center — Secure Access</div>
        </div>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:20,padding:28}}>
          <div style={{fontFamily:"Syne",fontSize:16,fontWeight:700,marginBottom:18}}>🔐 Login</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <label className="label">Username</label>
              <input className="input" placeholder="Enter username" value={username}
                onChange={e=>{setUsername(e.target.value);setError("");}}
                onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            </div>
            <div>
              <label className="label">Password</label>
              <div style={{position:"relative"}}>
                <input className="input" type={showPass?"text":"password"} placeholder="Enter password"
                  value={password} onChange={e=>{setPassword(e.target.value);setError("");}}
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()} style={{paddingRight:44}}/>
                <button onClick={()=>setShowPass(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--text3)",fontSize:16}}>
                  {showPass?"🙈":"👁️"}
                </button>
              </div>
            </div>
          </div>
          {error && (
            <div style={{marginTop:12,padding:"10px 14px",background:"#ef444418",border:"1px solid #ef444440",borderRadius:10,fontSize:13,color:"var(--red)",lineHeight:1.5}}>
              {error}
            </div>
          )}
          <button className="btn btn-primary" onClick={handleLogin} disabled={loading||!username||!password}
            style={{width:"100%",justifyContent:"center",marginTop:18,padding:14,fontSize:15,fontWeight:700}}>
            {loading?<><div style={{width:16,height:16,border:"2px solid #fff4",borderTop:"2px solid #fff",borderRadius:"50%",animation:"spin .6s linear infinite"}}/> Verifying...</>:"🚀 Login"}
          </button>
        </div>

        {/* ── Optional Import Section ── */}
        <div style={{marginTop:16,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:16,padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>

          {importMsg && (

            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid var(--border2)",background:"var(--bg3)",cursor:"pointer",color:"var(--text2)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .2s"}}>

        </div>
      </div>
    </div>
  );
}

// ─── CHANGE MY CREDENTIALS MODAL ──────────────────────────────────────────────
function ChangeCredentialsModal({ currentUser, onClose, onAvatarChange }) {
  const auth = getAuth();
  const isOwner = currentUser.role === "owner";
  const myData = isOwner ? auth.owner : (auth.admins||[]).find(a=>a.id===currentUser.id);
  const [form, setForm]       = useState({ username: myData?.username||"", displayName: myData?.displayName||"", password:"", confirmPass:"" });
  const [error, setError]     = useState("");
  const [success, setSuccess] = useState(false);
  const [avatarTab, setAvatarTab] = useState("current"); // "current" | "upload" | "emoji"
  const [avatar, setAvatar]   = useState(null);
  const [avatarLoading, setAvatarLoading] = useState(true);
  const [emojiSearch, setEmojiSearch] = useState("");
  const fileRef = useRef();

  // Load avatar from IndexedDB on mount
  useEffect(() => {
    getUserAvatar(currentUser.id, (av) => { setAvatar(av); setAvatarLoading(false); });
  }, []);

  const handleFileUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (!file.type.startsWith("image/")) { setError("Sirf image file upload karein!"); return; }
    if (file.size > 2*1024*1024) { setError("Image 2MB se chhoti honi chahiye."); return; }
    const reader = new FileReader();
    reader.onload = (ev) => { setAvatar(ev.target.result); setAvatarTab("current"); setError(""); };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const saveAvatar = async () => {
    await setUserAvatar(currentUser.id, avatar);
    if (onAvatarChange) onAvatarChange(avatar);
  };

  const save = async () => {
    setError("");
    if (!form.username.trim()) { setError("Username cannot be blank."); return; }
    if (form.password && form.password !== form.confirmPass) { setError("Passwords do not match!"); return; }
    if (form.password && form.password.length < 6) { setError("Password must be at least 6 characters."); return; }
    const newAuth = { ...getAuth() };
    if (isOwner) {
      newAuth.owner = { ...newAuth.owner, username: form.username.trim(), ...(form.password?{password:form.password}:{}) };
    } else {
      newAuth.admins = (newAuth.admins||[]).map(a => a.id===currentUser.id
        ? { ...a, username:form.username.trim(), displayName:form.displayName||form.username, ...(form.password?{password:form.password}:{}) }
        : a
      );
    }
    setAuth(newAuth);
    await saveAvatar();
    setSuccess(true);
    setTimeout(onClose, 1400);
  };

  const filteredEmojis = emojiSearch ? AVATAR_EMOJIS.filter(e=>e.includes(emojiSearch)) : AVATAR_EMOJIS;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:400}}>
        <div className="modal-title">🔑 My Profile & Credentials</div>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:16}}>{isOwner?"👑 Owner":"🛡️ Admin"} — apna profile update karo</div>
        {success ? (
          <div style={{textAlign:"center",padding:"20px 0",color:"var(--green)",fontFamily:"Syne",fontSize:16,fontWeight:700}}>✅ Profile updated successfully!</div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

            {/* ── Avatar Section ── */}
            <div style={{background:"var(--bg3)",borderRadius:14,padding:14,border:"1px solid var(--border)"}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--text2)",marginBottom:10,textTransform:"uppercase",letterSpacing:".5px"}}>Profile Picture</div>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12}}>
                {/* Preview */}
                <div style={{width:60,height:60,borderRadius:16,background:"var(--accentglow)",border:"2px solid var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden",fontSize:28}}>
                  {avatar
                    ? (avatar.startsWith("data:") || avatar.startsWith("http")
                        ? <img src={avatar} alt="av" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        : <span>{avatar}</span>)
                    : <Icon d={icons.user} size={24} stroke="var(--text3)"/>
                  }
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{isOwner?"Owner":form.displayName||form.username||"Admin"}</div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{isOwner?"👑 Owner":"🛡️ Admin"}</div>
                  {avatar && (
                    <button onClick={()=>setAvatar(null)} style={{marginTop:6,fontSize:10,color:"var(--red)",background:"none",border:"none",cursor:"pointer",padding:0,fontWeight:600}}>
                      ✕ Remove
                    </button>
                  )}
                </div>
              </div>

              {/* Tabs */}
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {[{key:"upload",label:"📷 Upload"},{key:"emoji",label:"😀 Emoji"}].map(tab=>(
                  <button key={tab.key} onClick={()=>setAvatarTab(t=>t===tab.key?"current":tab.key)}
                    style={{flex:1,padding:"6px 10px",borderRadius:8,border:`1px solid ${avatarTab===tab.key?"var(--accent)":"var(--border)"}`,background:avatarTab===tab.key?"var(--accentglow)":"var(--bg4)",cursor:"pointer",color:avatarTab===tab.key?"var(--accent2)":"var(--text3)",fontSize:11,fontWeight:600,transition:"all .15s"}}>

                    <Icon d={icons.upload} size={14} stroke="var(--text2)"/>

                  <div style={{fontSize:10,color:"var(--text3)",marginTop:6,textAlign:"center"}}>JPG, PNG, GIF, WebP supported</div>
                </div>
              )}

              {/* Emoji Panel */}
              {avatarTab==="emoji" && (
                <div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,maxHeight:100,overflowY:"auto",padding:4,borderRadius:10,background:"var(--bg4)",border:"1px solid var(--border)"}}>
                    {AVATAR_EMOJIS.map(em=>(
                      <button key={em} onClick={()=>{setAvatar(em);setAvatarTab("current");}}

                        {em}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* ── Credentials ── */}
            {!isOwner && <div><label className="label">Display Name</label><input className="input" value={form.displayName} placeholder="e.g. Rahul" onChange={e=>setForm(f=>({...f,displayName:e.target.value}))}/></div>}
            <div><label className="label">Username</label><input className="input" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))}/></div>
            <div><label className="label">New Password (blank = unchanged)</label><input className="input" type="password" placeholder="New password..." value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></div>
            {form.password && <div><label className="label">Confirm Password</label><input className="input" type="password" placeholder="Confirm..." value={form.confirmPass} onChange={e=>setForm(f=>({...f,confirmPass:e.target.value}))}/></div>}
            {error && <div style={{padding:"8px 12px",background:"#ef444418",border:"1px solid #ef444440",borderRadius:8,fontSize:12,color:"var(--red)"}}>⚠️ {error}</div>}
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:"center"}} onClick={onClose}>Cancel</button>
              <button className="btn btn-primary" style={{flex:2,justifyContent:"center"}} onClick={save}>💾 Save Changes</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADMIN MANAGER (Owner Only) ───────────────────────────────────────────────
function AdminPage({ onSessionLogout, onFullLogout, allData, onImport }) {
  const [admins, setAdmins]       = useState(() => getAuth().admins || []);
  const [view, setView]           = useState("list");
  const [editTarget, setEditTarget] = useState(null);
  const [form, setForm]           = useState({ username:"", displayName:"", password:"", confirmPass:"", permissions:[] });
  const [error, setError]         = useState("");
  const [success, setSuccess]     = useState("");
  const [showSyncModal, setShowSyncModal] = useState(false);
  const [importError, setImportError] = useState("");
  const [importOk, setImportOk]   = useState(false);
  const importRef = useRef();

  const exportData = () => {
    if (!allData) return;
    const data = JSON.stringify(allData, null, 2);
    const blob = new Blob([data], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`StudyOS_fullbackup_${new Date().toISOString().split("T")[0]}.json`; a.click();
    URL.revokeObjectURL(url);
    storage.set("lastExportDate", new Date().toISOString());
  };
  const handleImportFile = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setImportError(""); setImportOk(false);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (onImport) onImport(data);
        setImportOk(true);
        setTimeout(() => setImportOk(false), 4000);
      } catch { setImportError("Invalid backup file!"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const saveAuth = (newAdmins) => {
    const auth = getAuth();
    auth.admins = newAdmins;
    setAuth(auth);
    setAdmins(newAdmins);
  };

  const togglePerm = (key) => {
    setForm(f => ({
      ...f,
      permissions: f.permissions.includes(key) ? f.permissions.filter(p=>p!==key) : [...f.permissions, key]
    }));
  };

  const openAdd = () => {
    setForm({ username:"", displayName:"", password:"", confirmPass:"", permissions:[] });
    setError(""); setView("add");
  };

  const openEdit = (admin) => {
    setEditTarget(admin);
    setForm({ username:admin.username, displayName:admin.displayName||"", password:"", confirmPass:"", permissions:[...(admin.permissions||[])] });
    setError(""); setView("edit");
  };

  const addAdmin = () => {
    setError("");
    if (!form.username.trim()) { setError("Username required."); return; }
    if (!form.password) { setError("Password required."); return; }
    if (form.password !== form.confirmPass) { setError("Passwords do not match!"); return; }
    if (form.password.length < 6) { setError("Password must be at least 6 characters."); return; }
    const auth = getAuth();
    if ((auth.admins||[]).length >= MAX_ADMINS) { setError(`Maximum ${MAX_ADMINS} admins can be added!`); return; }
    const exists = (auth.admins||[]).find(a=>a.username===form.username.trim());
    if (exists) { setError("This username already exists."); return; }
    const newAdmin = {
      id: "adm_"+Date.now(),
      username: form.username.trim(),
      displayName: form.displayName.trim() || form.username.trim(),
      password: form.password,
      permissions: form.permissions,
      active: true,
      createdAt: new Date().toISOString()
    };
    const newAdmins = [...(auth.admins||[]), newAdmin];
    saveAuth(newAdmins);
    setSuccess(`Admin "${newAdmin.displayName}" added successfully!`);
    setTimeout(()=>{setSuccess("");setView("list");},1500);
  };

  const updateAdmin = () => {
    setError("");
    if (!form.username.trim()) { setError("Username required."); return; }
    if (form.password && form.password !== form.confirmPass) { setError("Passwords do not match!"); return; }
    if (form.password && form.password.length < 6) { setError("Password must be at least 6 characters."); return; }
    const auth = getAuth();
    const conflict = (auth.admins||[]).find(a=>a.username===form.username.trim()&&a.id!==editTarget.id);
    if (conflict) { setError("This username belongs to another admin."); return; }
    const newAdmins = (auth.admins||[]).map(a => a.id===editTarget.id ? {
      ...a,
      username: form.username.trim(),
      displayName: form.displayName.trim() || form.username.trim(),
      permissions: form.permissions,
      ...(form.password?{password:form.password}:{})
    } : a);
    saveAuth(newAdmins);
    setSuccess(`Admin "${form.displayName||form.username}" updated successfully!`);
    setTimeout(()=>{setSuccess("");setView("list");},1500);
  };

  const toggleActive = (admin) => {
    const newAdmins = (getAuth().admins||[]).map(a=>a.id===admin.id?{...a,active:!a.active}:a);
    saveAuth(newAdmins);
  };

  const removeAdmin = (admin) => {
    if(!window.confirm(`Are you sure you want to permanently delete "${admin.displayName||admin.username}"?`)) return;
    const newAdmins = (getAuth().admins||[]).filter(a=>a.id!==admin.id);
    saveAuth(newAdmins);
  };

  const permColor = "#7c6fff";

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Page Header */}
      <div className="card fade-up" style={{background:"linear-gradient(135deg,#7c6fff18,var(--bg2))",border:"1px solid #7c6fff30"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#7c6fff,#ec4899)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:24}}>
            👑
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800}}>Admin Manager</div>
            <div style={{fontSize:13,color:"var(--text3)",marginTop:2}}>{admins.length}/{MAX_ADMINS} admins • Owner supreme control</div>
          </div>
          {view!=="list" && (
            <button className="btn btn-ghost btn-sm" onClick={()=>{setView("list");setError("");}}>← Back</button>
          )}
        </div>
        {/* Owner quick actions */}
        {view==="list" && (
          <div style={{display:"flex",gap:8,marginTop:14,paddingTop:14,borderTop:"1px solid #7c6fff20",flexWrap:"wrap"}}>
            <button onClick={exportData}
              style={{flex:1,minWidth:120,padding:"9px 12px",borderRadius:10,border:"1px solid #7c6fff40",background:"#7c6fff15",cursor:"pointer",color:"#a78bfa",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Icon d={icons.download} size={13} stroke="#a78bfa"/> Export Backup
            </button>
            <button onClick={()=>importRef.current.click()}
              style={{flex:1,minWidth:120,padding:"9px 12px",borderRadius:10,border:"1px solid #10b98140",background:"#10b98115",cursor:"pointer",color:"var(--green)",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>

            </button>
            <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImportFile}/>
            <button onClick={()=>{ if(window.confirm("Logout from this session? Data will be preserved.")) onSessionLogout && onSessionLogout(); }}
              style={{flex:1,minWidth:120,padding:"9px 12px",borderRadius:10,border:"1px solid #ef444430",background:"#ef444412",cursor:"pointer",color:"var(--red)",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Icon d={icons.x} size={13} stroke="var(--red)"/> Logout
            </button>
          </div>
        )}

        {importError && <div style={{marginTop:10,padding:"8px 12px",background:"#ef444415",border:"1px solid #ef444440",borderRadius:8,fontSize:12,color:"var(--red)"}}>⚠️ {importError}</div>}
      </div>

      {/* Stats Row */}
      {view==="list" && (
        <div className="grid-3 fade-up">
          {[
            {label:"Total Admins", value:admins.length+"/"+MAX_ADMINS, color:"var(--accent2)"},
            {label:"Active", value:admins.filter(a=>a.active).length, color:"var(--green)"},
            {label:"Disabled", value:admins.filter(a=>!a.active).length, color:"var(--red)"},

              <div style={{fontFamily:"Syne",fontSize:26,fontWeight:800,color:s.color}}>{s.value}</div>
            </div>
          ))}
        </div>
      )}

      {success && (
        <div style={{padding:"12px 16px",background:"#10b98118",border:"1px solid #10b98140",borderRadius:12,fontSize:13,color:"var(--green)"}}>

      {/* LIST VIEW */}

        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {admins.length===0 ? (
            <div className="card" style={{textAlign:"center",padding:"48px 20px",color:"var(--text3)"}}>
              <div style={{fontSize:56,marginBottom:16}}>🛡️</div>

              </button>
            </div>
          ) : (
            <>
              {admins.map(admin=>(
                <div key={admin.id} className="card fade-up" style={{border:`1px solid ${admin.active?"var(--border)":"#ef444420"}`,background:admin.active?"var(--bg2)":"#ef444406"}}>

                      <AdminAvatar userId={admin.id}/>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"Syne",fontWeight:700,fontSize:16,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>

                        {!admin.active && <span style={{fontSize:10,padding:"2px 10px",borderRadius:99,background:"#ef444420",color:"var(--red)",fontWeight:600}}>Disabled</span>}
                      </div>
                      <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>@{admin.username}</div>
                      {admin.createdAt && <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Created: {new Date(admin.createdAt).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div>}
                    </div>
                  </div>
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,color:"var(--text3)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>
                      Permissions ({(admin.permissions||[]).length}/{ALL_PERMISSIONS.length})
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {(admin.permissions||[]).length===0
                        ? <span style={{fontSize:12,color:"var(--red)",fontWeight:600}}>No permissions assigned</span>
                        : ALL_PERMISSIONS.map(p=>{
                            const has=(admin.permissions||[]).includes(p.key);
                            return (
                              <span key={p.key} style={{
                                fontSize:11,padding:"3px 10px",borderRadius:99,fontWeight:600,
                                background:has?permColor+"20":"var(--bg4)",
                                color:has?permColor:"var(--text3)",
                                border:`1px solid ${has?permColor+"40":"var(--border)"}`,
                                opacity:has?1:0.5
                              }}>{p.label}</span>
                            );
                          })
                      }
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}} onClick={()=>openEdit(admin)}>
                      <Icon d={icons.edit} size={13}/> Edit
                    </button>
                    <button onClick={()=>toggleActive(admin)} className="btn btn-sm" style={{flex:1,justifyContent:"center",background:admin.active?"#ef444415":"#10b98115",color:admin.active?"var(--red)":"var(--green)",border:`1px solid ${admin.active?"#ef444430":"#10b98130"}`}}>
                      {admin.active?"Disable":"Enable"}
                    </button>
                    <button className="btn btn-danger btn-sm" style={{justifyContent:"center"}} onClick={()=>removeAdmin(admin)}>
                      <Icon d={icons.trash} size={13} stroke="var(--red)"/> Delete
                    </button>
                  </div>
                </div>
              ))}
              <button className="btn btn-primary" style={{width:"100%",justifyContent:"center",padding:14}}
                disabled={admins.length>=MAX_ADMINS} onClick={openAdd}>
                <Icon d={icons.plus} size={15} stroke="#fff"/>
                {admins.length>=MAX_ADMINS?`Admin limit reached (${MAX_ADMINS})`:"Add New Admin"}
              </button>
            </>
          )}
        </div>
      )}

      {/* ADD / EDIT FORM */}
      {(view==="add"||view==="edit") && (
        <div className="card fade-up" style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{fontFamily:"Syne",fontSize:17,fontWeight:700}}>
            {view==="add"?"Add New Admin":"Edit Admin"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><label className="label">Display Name</label><input className="input" placeholder="e.g. Rahul" value={form.displayName} onChange={e=>setForm(f=>({...f,displayName:e.target.value}))}/></div>
            <div><label className="label">Username *</label><input className="input" placeholder="login username" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div><label className="label">{view==="add"?"Password *":"New Password (optional)"}</label><input className="input" type="password" placeholder="password..." value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/></div>
            <div><label className="label">Confirm Password</label><input className="input" type="password" placeholder="confirm..." value={form.confirmPass} onChange={e=>setForm(f=>({...f,confirmPass:e.target.value}))}/></div>
          </div>
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <label className="label" style={{margin:0}}>Permissions — {form.permissions.length}/{ALL_PERMISSIONS.length} pages</label>
              <button onClick={()=>setForm(f=>({...f,permissions:f.permissions.length===ALL_PERMISSIONS.length?[]:ALL_PERMISSIONS.map(p=>p.key)}))}
                style={{fontSize:11,padding:"4px 12px",borderRadius:99,background:"var(--accentglow)",border:"1px solid var(--border)",color:"var(--accent2)",cursor:"pointer",fontWeight:700}}>
                {form.permissions.length===ALL_PERMISSIONS.length?"Deselect All":"Select All"}
              </button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {ALL_PERMISSIONS.map(p=>{
                const on=form.permissions.includes(p.key);
                return (
                  <div key={p.key} onClick={()=>togglePerm(p.key)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,border:`1.5px solid ${on?permColor+"60":"var(--border)"}`,background:on?permColor+"12":"var(--bg3)",cursor:"pointer",transition:"all .15s"}}>
                    <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${on?permColor:"var(--border2)"}`,background:on?permColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                      {on&&<Icon d={icons.check} size={11} stroke="#fff" strokeWidth={3}/>}
                    </div>
                    <Icon d={icons[p.icon]||icons.star} size={14} stroke={on?permColor:"var(--text3)"}/>
                    <span style={{fontSize:13,fontWeight:600,color:on?permColor:"var(--text2)"}}>{p.label}</span>
                  </div>
                );
              })}
            </div>
          </div>
          {error && <div style={{padding:"10px 14px",background:"#ef444418",border:"1px solid #ef444440",borderRadius:10,fontSize:13,color:"var(--red)"}}>⚠️ {error}</div>}
          <div style={{display:"flex",gap:10}}>
            <button className="btn btn-ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>{setView("list");setError("");}}>Cancel</button>
            <button className="btn btn-primary" style={{flex:2,justifyContent:"center"}} onClick={view==="add"?addAdmin:updateAdmin}>
              {view==="add"?"Add Admin":"Save Changes"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().split("T")[0];
const todayLabel = () => new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "short" });
const getStreak = (logs) => {
  let streak = 0; const d = new Date();
  // If today not logged yet, start checking from yesterday so streak isn't prematurely reset
  if (!logs[d.toISOString().split("T")[0]]) d.setDate(d.getDate() - 1);
  while (true) { const key = d.toISOString().split("T")[0]; if (logs[key]) { streak++; d.setDate(d.getDate() - 1); } else break; }
  return streak;
};
const getWeekDays = () => Array.from({ length: 7 }, (_, i) => { const d = new Date(); d.setDate(d.getDate() - 6 + i); return d.toISOString().split("T")[0]; });
const getLast90 = () => Array.from({ length: 90 }, (_, i) => { const d = new Date(); d.setDate(d.getDate() - 89 + i); return d.toISOString().split("T")[0]; });

// ─── CSS ──────────────────────────────────────────────────────────────────────
const getCSS = (theme) => {
  const t = THEMES[theme] || THEMES.dark_purple;
  const vars = Object.entries(t).filter(([k]) => k.startsWith('--')).map(([k,v]) => `${k}:${v}`).join(';');
  return `
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{${vars};
    --green:#10b981;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;--pink:#ec4899;
    --radius:16px;--radius-sm:10px;--radius-lg:24px;
    --shadow:0 8px 32px #00000060;
    --sidebar:260px;
    font-family:'DM Sans',sans-serif;
  }
  html,body,#root{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
  h1,h2,h3,h4,.font-syne{font-family:'Syne',sans-serif}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(300px) rotate(720deg);opacity:0}}
  @keyframes xpFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(1.3);opacity:0}}
  @keyframes pageEnter{from{opacity:0;transform:translateY(12px) scale(.988)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
  @keyframes pomoPulse{0%,100%{box-shadow:0 0 0 0 var(--accentglow)}50%{box-shadow:0 0 0 20px transparent}}
  @keyframes rankGlow{0%,100%{box-shadow:0 4px 14px var(--accentglow)}50%{box-shadow:0 6px 28px var(--accentglow),0 0 40px var(--accentglow)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes glow{0%,100%{box-shadow:0 0 20px var(--accentglow)}50%{box-shadow:0 0 40px var(--accentglow),0 0 60px var(--accentglow)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both}
  .fade-in{animation:fadeIn .3s ease both}
  .slide-in{animation:slideIn .35s cubic-bezier(.16,1,.3,1) both}
  /* ── LAYOUT ── */
  .app{display:flex;height:100vh;overflow:hidden;position:relative}
  /* ── OVERLAY (mobile) ── */
  .sidebar-overlay{display:none;position:fixed;inset:0;background:#00000060;z-index:40;backdrop-filter:blur(2px);animation:fadeIn .2s ease}
  .sidebar-overlay.visible{display:block}
  /* ── SIDEBAR ── */
  .sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:width .3s cubic-bezier(.16,1,.3,1),min-width .3s cubic-bezier(.16,1,.3,1),transform .3s cubic-bezier(.16,1,.3,1);position:relative;z-index:50;flex-shrink:0}
  .sidebar.collapsed{width:72px;min-width:72px}

// ─── RING CHART ───────────────────────────────────────────────────────────────
function RingChart({ percent, color, size = 80, label, sub }) {
  const r = (size / 2) - 8;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return (
    <div className="ring-chart" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg4)" strokeWidth="6" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s cubic-bezier(.16,1,.3,1)" }} />
      </svg>
      <div className="ring-chart-label">
        <div style={{ fontFamily: "Syne", fontWeight: 800, fontSize: size/4, lineHeight: 1 }}>{percent}%</div>
        {sub && <div style={{ fontSize: 9, color: "var(--text3)", marginTop: 2 }}>{sub}</div>}
      </div>
    </div>
  );
}

// ─── XP BADGE COMPONENT ──────────────────────────────────────────────────────
function XPBadge({xp}){
  const rank=getRank(xp), next=getNextRank(xp);
  const pct=next?Math.round((xp-rank.minXP)/(next.minXP-rank.minXP)*100):100;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <div className="rank-badge" style={{background:`linear-gradient(135deg,${rank.color},var(--accent2))`}}>
          <span style={{fontSize:18}}>{rank.emoji}</span>
          <span>Lv.{rank.level} {rank.name}</span>
        </div>
        <div style={{fontSize:13,color:"var(--text3)",fontWeight:600}}>{xp.toLocaleString()} XP total</div>
      </div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginBottom:5}}>
          <span>{rank.name}</span>
          {next && <span>→ {next.name} at {next.minXP.toLocaleString()} XP</span>}
        </div>
        <div className="xp-bar-wrap"><div className="xp-bar-fill" style={{width:`${pct}%`}}/></div>
      </div>
    </div>
  );
}

            <div style={{ display:"flex",gap:10,marginTop:20 }}>

              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={() => data.name && setStep(2)} disabled={!data.name}>Continue →</button>
            </div>
          </div>
        )}
        {step === 2 && (
          <div className="fade-up">
            <h3 style={{ fontFamily:"Syne",fontSize:18,fontWeight:700,marginBottom:8 }}>Your Target</h3>
            <p style={{ color:"var(--text3)",fontSize:13,marginBottom:20 }}>What are you preparing for?</p>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div><label className="label">Target Exam</label>
                <select className="input" value={data.target} onChange={e => setData(d => ({ ...d, target: e.target.value }))}>
                  <option>NEET 2025</option><option>NEET 2026</option><option>AIIMS</option><option>JEE Main</option><option>JEE Advanced</option><option>Boards Only</option>
                </select>
              </div>
              <div><label className="label">Bio / Motivation</label><textarea className="notes-area" style={{ minHeight:80 }} placeholder="Why are you doing this? Write your reason..." value={data.bio} onChange={e => setData(d => ({ ...d, bio: e.target.value }))} /></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setStep(1)}>← Back</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={() => onComplete(data)}>🚀 Let's Go!</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── HOME PAGE ────────────────────────────────────────────────────────────────
function HomePage({ profile, habits, habitLogs, setHabitLogs, lectures, lectureProgress, workoutLogs, goals, xp, onNavigate }) {
  const todayKey = today();
  const todayLog = habitLogs[todayKey] || {};
  const habitsDone = habits.filter(h => todayLog[h.id]).length;
  const workoutDone = !!workoutLogs[todayKey]?.done;
  const lecturesDone = lectures.filter(l => lectureProgress[l.id]?.[todayKey]?.done).length;
  const goalsAvg = goals.length ? Math.round(goals.reduce((s,g) => s+g.progress,0)/goals.length) : 0;
  const streak = getStreak(workoutLogs);
  const toggleHabit = (id, e) => {
    const wasOn = habitLogs[todayKey]?.[id];
    setHabitLogs(prev => ({ ...prev, [todayKey]: { ...(prev[todayKey]||{}), [id]: !prev[todayKey]?.[id] } }));
    if (!wasOn && e) { spawnConfetti(); spawnXP(XP_VALS.habit, e.clientX, e.clientY); }
  };
  const now = new Date(); const currentTotal = now.getHours()*60 + now.getMinutes();
  const currentSchedule = SCHEDULE.find((item,i) => {
    const [h,m] = item.time.split(":").map(Number); const t = h*60+(m||0);
    const next = SCHEDULE[i+1]; if (!next) return currentTotal >= t;
    const [nh,nm] = next.time.split(":").map(Number); const nt = nh*60+(nm||0);
    return currentTotal>=t && currentTotal<nt;
  });
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="card fade-up" style={{ background:"linear-gradient(135deg,var(--accentglow),var(--bg2))",border:"1px solid var(--border)" }}>
        <div style={{ display:"flex",alignItems:"center",gap:14 }}>
          <div className="profile-avatar" style={{ width:52,height:52,borderRadius:14,flexShrink:0 }}>
            {profile.avatar ? <img src={profile.avatar} alt="p" /> : <span style={{ fontSize:22 }}>🧑‍🎓</span>}
          </div>
          <div>
            <div style={{ fontFamily:"Syne",fontSize:20,fontWeight:800 }}>Good {now.getHours()<12?"Morning":now.getHours()<17?"Afternoon":"Evening"}, {profile.name?.split(" ")[0] || "Student"}! 👋</div>
            <div style={{ color:"var(--text3)",fontSize:13,marginTop:2 }}>{todayLabel()} • {profile.target}</div>
          </div>
        </div>
        {xp !== undefined && (
          <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)"}}>
            <XPBadge xp={xp}/>
          </div>
        )}
        {currentSchedule && (
          <div style={{ marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10 }}>
            <span style={{ fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600 }}>NOW:</span>
            <span style={{ fontSize:14,fontWeight:600,color:"var(--accent2)" }}>{currentSchedule.label}</span>
            <span style={{ fontSize:10,background:"var(--accentglow)",color:"var(--accent2)",padding:"2px 8px",borderRadius:99,fontWeight:700 }}>{currentSchedule.time}</span>
          </div>
        )}
        {onNavigate && (
          <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)",display:"flex",gap:10}}>
            <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:"center"}} onClick={()=>onNavigate("focus")}>⏱ Focus Mode</button>
            <button className="btn btn-ghost btn-sm" style={{flex:1,justifyContent:"center"}} onClick={()=>onNavigate("revision")}>🧠 Revision Lab</button>
          </div>
        )}
      </div>
      <div className="grid-4 fade-up" style={{ animationDelay:".05s" }}>
        {[
          { label:"Habits Done", value:`${habitsDone}/${habits.length}`, color:"var(--green)", icon:icons.habits },
          { label:"Streak", value:`${streak}d 🔥`, color:"var(--red)", icon:icons.fire },
          { label:"Lectures", value:`${lecturesDone}/${lectures.length}`, color:"var(--blue)", icon:icons.lectures },
          { label:"Goals Avg", value:`${goalsAvg}%`, color:"var(--accent2)", icon:icons.goals },
        ].map((s,i) => (
          <div key={i} className="stat-card" style={{ animationDelay:`${i*.04}s` }}>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4 }}>
              <Icon d={s.icon} size={16} stroke={s.color} />
              <span style={{ fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600 }}>{s.label}</span>
            </div>

          </div>
        ))}
      </div>
      <div className="grid-2 fade-up" style={{ animationDelay:".1s" }}>
        <div className="card">
          <div className="section-title"><Icon d={icons.habits} size={15} stroke="var(--green)" /> Today's Habits</div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {habits.slice(0,5).map(h => (
              <div key={h.id} className={`habit-item ${todayLog[h.id]?"done":""}`} onClick={(e) => toggleHabit(h.id, e)}>
                <div className="habit-check">{todayLog[h.id] && <Icon d={icons.check} size={13} stroke="#fff" strokeWidth={2.5}/>}</div>
                <span style={{ fontSize:16 }}>{h.emoji}</span>
                <span style={{ fontSize:13,fontWeight:500,flex:1,textDecoration:todayLog[h.id]?"line-through":"none",color:todayLog[h.id]?"var(--text3)":"var(--text)" }}>{h.name}</span>
              </div>
            ))}

        </div>
        <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
          <div className="card">
            <div className="section-title"><Icon d={icons.goals} size={15} stroke="var(--accent2)" /> Goals</div>

              {goals.slice(0,3).map(g => (
                <div key={g.id}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12 }}>
                    <span style={{ fontWeight:600 }}>{g.emoji} {g.title}</span>
                    <span style={{ color:"var(--text3)" }}>{g.progress}%</span>
                  </div>
                  <div className="progress-bar"><div className="progress-fill" style={{ width:`${g.progress}%`,background:"linear-gradient(90deg,var(--accent),var(--accent2))" }}/></div>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{ flex:1 }}>
            <div style={{ fontFamily:"Syne",fontWeight:700,marginBottom:10 }}>📊 Today's Progress</div>
            <div style={{ display:"flex",justifyContent:"space-around" }}>
              <RingChart percent={habits.length ? Math.round(habitsDone/habits.length*100) : 0} color="var(--green)" size={70} />
              <RingChart percent={lectures.length ? Math.round(lecturesDone/lectures.length*100) : 0} color="var(--blue)" size={70} />
              <RingChart percent={workoutDone ? 100 : 0} color="var(--red)" size={70} />
            </div>
            <div style={{ display:"flex",justifyContent:"space-around",marginTop:8 }}>
              {["Habits","Lectures","Workout"].map(l => <div key={l} style={{ fontSize:10,color:"var(--text3)",textAlign:"center" }}>{l}</div>)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SCHEDULE PAGE ────────────────────────────────────────────────────────────
const ICON_OPTIONS = ["sun","book","dumbbell","fire","brain","flask","atom","microscope","timer","target","notes","moon","star","habits","check","bell"];
const COLOR_OPTIONS = ["#f59e0b","#10b981","#ef4444","#f97316","#3b82f6","#8b5cf6","#06b6d4","#ec4899","#6b7280","#22c55e"];

function SchedulePage() {
  const currentHour = new Date().getHours(), currentMin = new Date().getMinutes();
  const currentTotal = currentHour * 60 + currentMin;

  const getTomorrowKey = () => {
    const d = new Date(); d.setDate(d.getDate()+1);
    return d.toISOString().split("T")[0];
  };
  const tomorrowKey = getTomorrowKey();
  const tomorrowLabel = new Date(tomorrowKey+"T00:00").toLocaleDateString("en-IN",{ weekday:"long",day:"numeric",month:"short" });

  const [activeTab, setActiveTab] = useState("today"); // "today" | "tomorrow"
  const [tomorrowSchedule, setTomorrowSchedule] = useState(() => { const s = storage.get("tomorrowSchedule_"+tomorrowKey, null); return Array.isArray(s) ? s : null; });
  const [editMode, setEditMode] = useState(false);
  const [localItems, setLocalItems] = useState([]);
  const [showAddItem, setShowAddItem] = useState(false);
  const [newItem, setNewItem] = useState({ time:"06:00", label:"", icon:"sun", color:"#f59e0b" });

  // When tab switches to tomorrow, init local items
  useEffect(() => {
    if (activeTab === "tomorrow") {
      const saved = storage.get("tomorrowSchedule_"+tomorrowKey, null);
      setLocalItems(Array.isArray(saved) ? [...saved] : SCHEDULE.map(s=>({...s})));
    }
  }, [activeTab, tomorrowKey]);

  const saveSchedule = () => {
    const sorted = [...localItems].sort((a,b) => a.time.localeCompare(b.time));
    storage.set("tomorrowSchedule_"+tomorrowKey, sorted);
    setTomorrowSchedule(sorted);
    setEditMode(false);
  };

  const deleteItem = (idx) => setLocalItems(prev => prev.filter((_,i)=>i!==idx));
  const updateItem = (idx, key, val) => setLocalItems(prev => prev.map((it,i)=>i===idx?{...it,[key]:val}:it));

  const addItem = () => {
    if (!newItem.label.trim() || !newItem.time) return;
    setLocalItems(prev => [...prev, { ...newItem }]);
    setNewItem({ time:"06:00", label:"", icon:"sun", color:"#f59e0b" });
    setShowAddItem(false);
  };

  const displayTomorrow = tomorrowSchedule || SCHEDULE;

  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      {/* Header */}
      <div className="card fade-up" style={{ padding:"20px 24px" }}>
        <div style={{ fontSize:12,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".8px",fontWeight:600,marginBottom:4 }}>The Survivor Schedule</div>
        <div style={{ fontFamily:"Syne",fontSize:18,fontWeight:700 }}>Mon – Sat Daily Timeline</div>
        <div style={{ fontSize:13,color:"var(--text3)",marginTop:4 }}>20 hours committed • 4 hours free • 7 hours sleep</div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex",gap:8 }}>
        {["today","tomorrow"].map(tab => (
          <button key={tab} onClick={() => { setActiveTab(tab); setEditMode(false); }}
            style={{ flex:1,padding:"10px 0",borderRadius:12,border:`1.5px solid ${activeTab===tab?"var(--accent)":"var(--border)"}`,background:activeTab===tab?"var(--accentglow)":"var(--bg2)",color:activeTab===tab?"var(--accent2)":"var(--text2)",fontFamily:"Syne",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .2s" }}>
            {tab==="today" ? "📅 Today" : `📆 Tomorrow — ${tomorrowLabel}`}
          </button>
        ))}
      </div>

      {/* TODAY'S SCHEDULE */}
      {activeTab === "today" && (
        <>
          <div className="card fade-up" style={{ animationDelay:".05s" }}>
            {SCHEDULE.map((item,i) => {
              const [h,m] = item.time.split(":").map(Number); const total = h*60+(m||0);
              const next = SCHEDULE[i+1];
              const nextTotal = next ? (() => { const [nh,nm] = next.time.split(":").map(Number); return nh*60+(nm||0); })() : 99999;
              const isCurrent = currentTotal>=total && currentTotal<nextTotal;
              return (
                <div key={i} className={`timeline-item ${isCurrent?"current":""}`}>
                  <div className="timeline-time">{item.time}</div>
                  <div className="timeline-dot" style={{ background:item.color+"20",color:item.color }}>
                    <Icon d={icons[item.icon]||icons.timer} size={16} stroke={item.color} />
                  </div>
                  <div className="timeline-label" style={{ flex:1 }}>
                    {item.label}
                    {isCurrent && <span style={{ marginLeft:8,fontSize:10,background:"var(--accentglow)",color:"var(--accent2)",padding:"2px 8px",borderRadius:99,fontWeight:700 }}>NOW</span>}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="card fade-up" style={{ animationDelay:".2s",background:"linear-gradient(135deg,#3b82f618,#06b6d418)",border:"1px solid #3b82f630" }}>
            <div style={{ fontFamily:"Syne",fontWeight:700,marginBottom:8 }}>☀️ Sunday Reset Mode</div>
            <div style={{ fontSize:13,color:"var(--text3)",lineHeight:1.8 }}>06:00 Wake → 06:15 Full Workout → 07:45 Bio Revision → 10:00 Chem Revision → 12:00 Podcast → 14:00 Physics + PYQs → 16:00 Meal Prep → 18:00 Free Reading → 21:30 Sleep</div>
          </div>
        </>
      )}

      {/* TOMORROW'S SCHEDULE */}
      {activeTab === "tomorrow" && (
        <>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div style={{ fontSize:13,color:"var(--text3)" }}>
              {tomorrowSchedule ? "✅ Custom schedule saved" : "ℹ️ Using default schedule"}
            </div>
            <div style={{ display:"flex",gap:8 }}>
              {!editMode ? (
                <button className="btn btn-primary btn-sm" onClick={() => { setEditMode(true); setLocalItems(displayTomorrow.map(s=>({...s}))); }}>
                  <Icon d={icons.edit} size={14} stroke="#fff"/> Edit Schedule
                </button>
              ) : (
                <>
                  <button className="btn btn-ghost btn-sm" onClick={() => setEditMode(false)}>Cancel</button>
                  <button className="btn btn-success btn-sm" onClick={saveSchedule}>
                    <Icon d={icons.check} size={14} stroke="var(--green)"/> Save
                  </button>
                </>
              )}
            </div>
          </div>

          {!editMode ? (
            <div className="card fade-up">
              {displayTomorrow.map((item,i) => (
                <div key={i} className="timeline-item">
                  <div className="timeline-time">{item.time}</div>
                  <div className="timeline-dot" style={{ background:item.color+"20" }}>
                    <Icon d={icons[item.icon]||icons.timer} size={16} stroke={item.color} />
                  </div>
                  <div className="timeline-label" style={{ flex:1 }}>{item.label}</div>
                </div>
              ))}
            </div>
          ) : (
            <div className="card fade-up">
              <div style={{ fontFamily:"Syne",fontWeight:700,fontSize:14,marginBottom:16,color:"var(--accent2)" }}>
                ✏️ Edit Tomorrow's Schedule
              </div>
              <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                {localItems.sort((a,b)=>a.time.localeCompare(b.time)).map((item,i) => (
                  <div key={i} style={{ display:"flex",gap:8,alignItems:"center",padding:"10px 12px",background:"var(--bg3)",borderRadius:10,border:"1px solid var(--border)" }}>
                    <input type="time" value={item.time}
                      onChange={e => updateItem(i, "time", e.target.value)}
                      style={{ background:"var(--bg4)",border:"1px solid var(--border)",borderRadius:8,padding:"4px 8px",color:"var(--text)",fontSize:12,width:90,flexShrink:0 }}
                    />
                    <div style={{ width:28,height:28,borderRadius:8,background:item.color+"30",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                      <Icon d={icons[item.icon]||icons.timer} size={14} stroke={item.color}/>
                    </div>
                    <input className="input" value={item.label} placeholder="Activity..."
                      onChange={e => updateItem(i, "label", e.target.value)}
                      style={{ flex:1,padding:"6px 10px",fontSize:13 }}
                    />
                    <div style={{ display:"flex",gap:4,flexShrink:0 }}>
                      {COLOR_OPTIONS.slice(0,5).map(c => (
                        <div key={c} onClick={() => updateItem(i,"color",c)}
                          style={{ width:16,height:16,borderRadius:4,background:c,cursor:"pointer",border:item.color===c?"2px solid var(--text)":"1px solid transparent",flexShrink:0 }}
                        />
                      ))}
                    </div>
                    <button onClick={() => deleteItem(i)} style={{ background:"none",border:"none",cursor:"pointer",color:"var(--red)",padding:4,flexShrink:0 }}>
                      <Icon d={icons.trash} size={14} stroke="var(--red)"/>
                    </button>
                  </div>
                ))}
              </div>
              <button className="btn btn-ghost btn-sm" style={{ marginTop:12,width:"100%",justifyContent:"center" }}
                onClick={() => setShowAddItem(true)}>
                <Icon d={icons.plus} size={14}/> Add Activity
              </button>
            </div>
          )}

          {/* Reset to default */}
          {tomorrowSchedule && !editMode && (
            <button className="btn btn-ghost btn-sm" style={{ alignSelf:"flex-start" }}
              onClick={() => { storage.set("tomorrowSchedule_"+tomorrowKey, false); setTomorrowSchedule(null); }}>
              🔄 Reset to Default Schedule
            </button>
          )}
        </>
      )}

      {/* Add Item Modal */}
      {showAddItem && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowAddItem(false)}>
          <div className="modal" style={{ maxWidth:400 }}>
            <div className="modal-title">➕ Add New Activity</div>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div><label className="label">Time</label>
                <input type="time" className="input" value={newItem.time} onChange={e=>setNewItem(p=>({...p,time:e.target.value}))}/>
              </div>
              <div><label className="label">Activity Name</label>
                <input className="input" placeholder="e.g. Biology Revision" value={newItem.label} onChange={e=>setNewItem(p=>({...p,label:e.target.value}))}/>
              </div>
              <div><label className="label">Icon</label>
                <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                  {ICON_OPTIONS.map(ic => (
                    <div key={ic} onClick={() => setNewItem(p=>({...p,icon:ic}))}
                      style={{ width:36,height:36,borderRadius:8,border:`2px solid ${newItem.icon===ic?"var(--accent)":"var(--border)"}`,background:newItem.icon===ic?"var(--accentglow)":"var(--bg3)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer" }}>
                      <Icon d={icons[ic]||icons.timer} size={16} stroke={newItem.icon===ic?"var(--accent2)":"var(--text3)"}/>
                    </div>
                  ))}
                </div>
              </div>
              <div><label className="label">Color</label>
                <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
                  {COLOR_OPTIONS.map(c => (
                    <div key={c} onClick={() => setNewItem(p=>({...p,color:c}))}
                      style={{ width:28,height:28,borderRadius:8,background:c,cursor:"pointer",border:newItem.color===c?"2px solid var(--text)":"2px solid transparent",transition:"transform .15s",transform:newItem.color===c?"scale(1.2)":"scale(1)" }}/>
                  ))}
                </div>
              </div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setShowAddItem(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={addItem}>Add Activity</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── HABITS PAGE ─────────────────────────────────────────────────────────────

// ─── LECTURES PAGE ────────────────────────────────────────────────────────────

              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>

}

// ─── WORKOUT PAGE ─────────────────────────────────────────────────────────────
function WorkoutPage({ exercises, setExercises, workoutLogs, setWorkoutLogs }) {
  const [showAdd, setShowAdd] = useState(false);
  const [sessionActive, setSessionActive] = useState(false);
  const [completed, setCompleted] = useState({});
  const [newEx, setNewEx] = useState({ name:"", sets:3, reps:10, unit:"reps", category:"chest" });
  const todayKey = today();
  const categories = ["chest","back","legs","shoulders","arms","core","cardio"];
  const grouped = categories.reduce((acc,cat) => { acc[cat]=exercises.filter(e => e.category===cat); return acc; },{});
  const finishWorkout = () => { setWorkoutLogs(prev => ({ ...prev, [todayKey]:{ done:true,exercises:completed,timestamp:Date.now() } })); setSessionActive(false); setCompleted({}); };
  const addEx = () => { if (!newEx.name) return; setExercises(prev => [...prev,{ ...newEx,id:Date.now() }]); setNewEx({ name:"",sets:3,reps:10,unit:"reps",category:"chest" }); setShowAdd(false); };
  const streak = getStreak(workoutLogs); const todayDone = workoutLogs[todayKey]?.done;
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="grid-3 fade-up">
        {[
          { label:"Current Streak", value:streak+" days", color:"var(--red)", icon:icons.fire },
          { label:"Total Exercises", value:exercises.length, color:"var(--blue)", icon:icons.dumbbell },
          { label:"Today", value:todayDone?"✓ Done":"Not Done", color:todayDone?"var(--green)":"var(--text3)", icon:icons.check },
        ].map((s,i) => (
          <div key={i} className="stat-card" style={{ animationDelay:`${i*.04}s` }}>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}>
              <Icon d={s.icon} size={18} stroke={s.color}/><span style={{ fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600 }}>{s.label}</span>
            </div>
            <div className="stat-value" style={{ color:s.color,fontSize:22 }}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div className="section-title" style={{ margin:0 }}><Icon d={icons.workout} size={16} stroke="var(--red)" /> Workout Plan</div>
        <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
          <button className="btn btn-ghost btn-sm" onClick={() => setShowAdd(true)}><Icon d={icons.plus} size={14}/> Add Exercise</button>
          {!sessionActive && !todayDone && <button className="btn btn-primary btn-sm" onClick={() => setSessionActive(true)}><Icon d={icons.fire} size={14} stroke="#fff"/> Start Workout</button>}
          {todayDone && <span className="badge" style={{ background:"#10b98120",color:"var(--green)",border:"1px solid #10b98130",padding:"8px 14px" }}>✓ Workout Complete!</span>}
        </div>
      </div>
      {sessionActive && (
        <div className="card fade-up" style={{ background:"linear-gradient(135deg,#ef444412,#f9731612)",border:"1px solid #ef444430" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
            <div style={{ fontFamily:"Syne",fontSize:16,fontWeight:700,color:"var(--red)" }}>🔥 Session Active</div>
            <div style={{ fontSize:13,color:"var(--text3)" }}>{Object.keys(completed).length}/{exercises.length} done</div>
          </div>
          <div className="progress-bar" style={{ marginBottom:14 }}>
            <div className="progress-fill" style={{ width:`${exercises.length?(Object.keys(completed).length/exercises.length)*100:0}%`,background:"linear-gradient(90deg,var(--red),var(--amber))" }}/>
          </div>
          <button className="btn btn-primary" style={{ background:"var(--green)",width:"100%",justifyContent:"center" }} onClick={finishWorkout}>✓ Mark Workout Complete</button>
        </div>
      )}
      {categories.filter(c => grouped[c].length > 0).map(cat => (
        <div key={cat} className="card fade-up">
          <div className="section-title" style={{ textTransform:"capitalize" }}>{cat}</div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {grouped[cat].map(ex => {
              const done = sessionActive && completed[ex.id];
              return (
                <div key={ex.id} className={`workout-exercise ${done?"exercise-complete":""}`}>
                  {sessionActive && (
                    <button onClick={() => setCompleted(prev => ({ ...prev, [ex.id]:!prev[ex.id] }))} style={{ width:28,height:28,borderRadius:8,border:`1.5px solid ${done?"var(--green)":"var(--border2)"}`,background:done?"var(--green)":"var(--bg4)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s" }}>
                      {done && <Icon d={icons.check} size={13} stroke="#fff" strokeWidth={2.5}/>}
                    </button>
                  )}
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600,fontSize:14,marginBottom:2 }}>{ex.name}</div>
                    <div style={{ fontSize:12,color:"var(--text3)" }}>{ex.sets} sets × {ex.reps} {ex.unit}</div>
                  </div>
                  <button className="btn btn-icon btn-danger btn-sm" onClick={() => setExercises(prev => prev.filter(e => e.id!==ex.id))}><Icon d={icons.trash} size={13} stroke="var(--red)"/></button>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {showAdd && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowAdd(false)}>
          <div className="modal">
            <div className="modal-title">Add Exercise</div>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div><label className="label">Exercise Name</label><input className="input" placeholder="e.g. Pushups" value={newEx.name} onChange={e => setNewEx(p => ({ ...p, name:e.target.value }))}/></div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10 }}>
                <div><label className="label">Sets</label><input className="input" type="number" value={newEx.sets} onChange={e => setNewEx(p => ({ ...p, sets:+e.target.value }))}/></div>
                <div><label className="label">Reps</label><input className="input" type="number" value={newEx.reps} onChange={e => setNewEx(p => ({ ...p, reps:+e.target.value }))}/></div>
                <div><label className="label">Unit</label><select className="input" value={newEx.unit} onChange={e => setNewEx(p => ({ ...p, unit:e.target.value }))}><option>reps</option><option>seconds</option><option>minutes</option></select></div>
              </div>
              <div><label className="label">Category</label><select className="input" value={newEx.category} onChange={e => setNewEx(p => ({ ...p, category:e.target.value }))}>{categories.map(c => <option key={c}>{c}</option>)}</select></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setShowAdd(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={addEx}>Add Exercise</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
