<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyOS — Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --purple: #7c6fff;
      --pink: #ec4899;
      --teal: #00e5c4;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    .sos-root {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font-display);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 48px;
      position: relative;
      overflow-x: hidden;
    }
    .sos-root::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .sos-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }
    .sos-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: 0.18em;
      color: var(--purple);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sos-tagline {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }
    .sos-steps {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .sos-step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      flex-shrink: 0;
    }
    .sos-step-dot.active {
      background: var(--purple);
      box-shadow: 0 0 12px var(--purple);
      transform: scale(1.5);
    }
    .sos-step-dot.done { background: var(--teal); }
    .sos-step-line {
      flex: 1; height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }
    .sos-step-line-fill {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      background: var(--teal);
      transition: width 0.6s ease;
    }
    .sos-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
    }
    .sos-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--pink));
    }
    .sos-section-title {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: var(--font-mono);
      margin-bottom: 20px;
    }
    .sos-field { margin-bottom: 18px; }
    .sos-label {
      display: block;
      font-size: 0.72rem;
      font-family: var(--font-mono);
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }
    .sos-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .sos-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,111,255,0.15);
    }
    textarea.sos-input { resize: vertical; min-height: 100px; }
    .sos-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .sos-pill {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .sos-pill:hover { border-color: var(--purple); color: var(--text); }
    .sos-pill.selected {
      border-color: var(--purple);
      background: rgba(124,111,255,0.18);
      color: var(--purple);
      box-shadow: 0 0 10px rgba(124,111,255,0.25);
    }
    .sos-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .sos-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,111,255,0.35); }
    .sos-btn:active { transform: scale(0.98); }
    .sos-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── MACHINE ── */
    .sos-machine {
      margin: 24px 0 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 120px;
      position: relative;
      overflow: hidden;
    }
    .sos-machine-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── PULLEY ── */
    .pulley-scene {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      height: 80px;
      justify-content: center;
    }
    .pulley-wheel-wrap { display: flex; flex-direction: column; align-items: center; }
    .pulley-wheel {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 3px solid var(--purple);
      background: var(--surface2);
      position: relative;
      transition: transform 0.1s linear;
    }
    .pulley-spoke {
      position: absolute;
      top: 50%; left: 50%;
      width: 14px; height: 2px;
      background: var(--purple);
      transform-origin: left center;
      opacity: 0.6;
    }
    .pulley-rope { width: 2px; background: var(--muted); }
    .pulley-weight {
      width: 28px; height: 20px;
      background: linear-gradient(135deg, var(--purple), #5a4fff);
      border-radius: 4px;
      box-shadow: 0 4px 12px rgba(124,111,255,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; color: rgba(255,255,255,0.7);
      font-family: var(--font-mono);
      transition: transform 0.15s ease-out;
    }
    .pulley-rope-left, .pulley-rope-right {
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── GEARS ── */
    .gears-scene {
      display: flex; align-items: center;
      justify-content: center;
      gap: 2px; height: 80px;
    }

    /* ── PHOTO DROPPER ── */
    .photo-scene {
      height: 80px; position: relative;
      display: flex; justify-content: center;
    }
    .ball {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), #ff6b9d);
      position: absolute; top: 0;
      box-shadow: 0 0 10px rgba(236,72,153,0.5);
      transition: top 0.45s cubic-bezier(0.55,-0.1,0.45,1.4);
    }
    .ball.dropped { top: 52px; }
    .shutter {
      position: absolute; bottom: 8px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 14px;
      display: flex; gap: 3px;
    }
    .shutter-blade {
      flex: 1; background: var(--purple);
      border-radius: 2px;
      transform-origin: bottom center;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .shutter-blade.open { transform: scaleY(0.2); }

    /* ── LIQUID FILL ── */
    .liquid-scene {
      height: 80px; display: flex;
      align-items: flex-end; justify-content: center; gap: 8px;
    }
    .flask {
      width: 44px; height: 68px;
      border: 2px solid var(--teal);
      border-radius: 4px 4px 10px 10px;
      position: relative; overflow: hidden;
      background: var(--surface2);
    }
    .flask-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,229,196,0.7), rgba(124,111,255,0.4));
      transition: height 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .flask-fill.pink-fill {
      background: linear-gradient(to top, rgba(236,72,153,0.6), rgba(124,111,255,0.3));
    }
    .flask-bubble {
      position: absolute; bottom: 4px; left: 6px;
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: bubble 2s ease-in-out infinite;
    }
    .flask-bubble:nth-child(2) { left: 16px; animation-delay: 0.7s; width: 4px; height: 4px; }
    .flask-bubble:nth-child(3) { left: 26px; animation-delay: 1.3s; }
    @keyframes bubble {
      0%,100% { transform: translateY(0); opacity: 0.35; }
      50% { transform: translateY(-12px); opacity: 0.1; }
    }
    .flask-label {
      width: 44px; text-align: center;
      font-family: var(--font-mono); font-size: 0.58rem;
      color: var(--teal); margin-top: 4px;
    }

    /* ── LEVER ── */
    .lever-scene {
      height: 80px; display: flex;
      align-items: center; justify-content: center; gap: 16px;
    }
    .lever-base {
      width: 80px; height: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      position: relative; display: flex; align-items: center;
    }
    .lever-pivot {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 10px; height: 10px;
      border-radius: 50%; background: var(--purple); z-index: 2;
    }
    .lever-arm {
      position: absolute; left: 50%; bottom: 5px;
      width: 4px; height: 44px;
      background: linear-gradient(to top, var(--purple), var(--pink));
      border-radius: 4px;
      transform-origin: bottom center;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .lever-arm.swung { transform: rotate(-55deg); }
    .lever-ball {
      position: absolute; top: -8px; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 12px;
      border-radius: 50%; background: var(--pink);
      box-shadow: 0 0 8px var(--pink);
    }

    /* ── Photo upload ── */
    .photo-upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px; padding: 24px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative; overflow: hidden;
    }
    .photo-upload-zone:hover, .photo-upload-zone.has-photo {
      border-color: var(--pink);
      background: rgba(236,72,153,0.05);
    }
    .photo-preview {
      width: 72px; height: 72px;
      border-radius: 50%; object-fit: cover;
      margin: 0 auto 8px; display: block;
      border: 2px solid var(--pink);
    }
    .photo-upload-icon { font-size: 2rem; margin-bottom: 6px; }
    .photo-upload-text {
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted);
    }
    input[type=file] { display: none; }

    /* ── Done screen ── */
    .sos-done {
      text-align: center; padding: 32px 0;
      animation: fadeUp 0.6s ease forwards;
    }
    .sos-done-icon {
      font-size: 3.5rem; margin-bottom: 16px;
      animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    .sos-done-title {
      font-size: 1.5rem; font-weight: 800;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    .sos-done-sub {
      font-family: var(--font-mono); font-size: 0.78rem;
      color: var(--muted); line-height: 1.6;
    }
    .sos-done-card {
      margin-top: 32px; padding: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; font-family: var(--font-mono);
      font-size: 0.72rem; color: var(--muted);
      line-height: 1.8; text-align: left;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .step-footer {
      margin-top: 16px; text-align: center;
      font-family: var(--font-mono);
      font-size: 0.62rem; color: var(--muted);
    }

    @media (max-width: 360px) { .sos-card { padding: 20px 16px; } }

    /* ── Crop Modal ── */
    .crop-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px;
      backdrop-filter: blur(6px);
    }
    .crop-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%; max-width: 420px;
      overflow: hidden;
      position: relative;
    }
    .crop-modal::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--pink));
    }
    .crop-header {
      padding: 16px 20px 12px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .crop-ratio-bar {
      display: flex; gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      overflow-x: auto;
    }
    .crop-ratio-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      transition: all 0.2s;
    }
    .crop-ratio-btn:hover { border-color: var(--purple); color: var(--text); }
    .crop-ratio-btn.active {
      border-color: var(--purple);
      background: rgba(124,111,255,0.18);
      color: var(--purple);
      box-shadow: 0 0 10px rgba(124,111,255,0.2);
    }
    .crop-ratio-icon {
      background: var(--border);
      border-radius: 2px;
    }
    .crop-ratio-btn.active .crop-ratio-icon {
      background: var(--purple);
    }
    .crop-canvas-wrap {
      position: relative;
      width: 100%;
      height: 280px;
      background: #000;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }
    .crop-canvas-wrap:active { cursor: grabbing; }
    #crop-img {
      position: absolute;
      transform-origin: 0 0;
      user-select: none;
      pointer-events: none;
    }
    .crop-box {
      position: absolute;
      border: 2px solid var(--purple);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      pointer-events: none;
    }
    .crop-box-corner {
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--purple);
      border-style: solid;
    }
    .crop-box-corner.tl { top: -1px; left: -1px; border-width: 3px 0 0 3px; }
    .crop-box-corner.tr { top: -1px; right: -1px; border-width: 3px 3px 0 0; }
    .crop-box-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 3px 3px; }
    .crop-box-corner.br { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; }
    .crop-hint {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      padding: 8px;
      background: var(--surface2);
    }
    .crop-actions {
      display: flex; gap: 10px;
      padding: 14px 16px;
    }
    .crop-btn-cancel {
      flex: 1; padding: 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .crop-btn-cancel:hover { border-color: var(--pink); color: var(--pink); }
    .crop-btn-apply {
      flex: 2; padding: 11px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .crop-btn-apply:hover { transform: translateY(-1px); }
    .zoom-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px 10px;
      background: var(--surface2);
    }
    .zoom-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      white-space: nowrap;
    }
    input[type=range].zoom-slider {
      flex: 1; display: block;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      outline: none;
    }
    input[type=range].zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--purple);
      box-shadow: 0 0 8px rgba(124,111,255,0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="sos-root">
  <div class="sos-inner">
    <div class="sos-logo">StudyOS</div>
    <div id="app"></div>
  </div>
</div>

<!-- Crop Modal -->
<div class="crop-overlay" id="crop-overlay" style="display:none">
  <div class="crop-modal">
    <div class="crop-header">⚙ crop // select region</div>
    <div class="crop-ratio-bar">
      <button class="crop-ratio-btn active" onclick="setRatio('1:1')">
        <div class="crop-ratio-icon" style="width:20px;height:20px;"></div>
        1:1
      </button>
      <button class="crop-ratio-btn" onclick="setRatio('1:4')">
        <div class="crop-ratio-icon" style="width:10px;height:20px;"></div>
        1:4
      </button>
      <button class="crop-ratio-btn" onclick="setRatio('19:6')">
        <div class="crop-ratio-icon" style="width:22px;height:7px;"></div>
        19:6
      </button>
      <button class="crop-ratio-btn" onclick="setRatio('free')">
        <div class="crop-ratio-icon" style="width:18px;height:14px;border-radius:3px;"></div>
        Free
      </button>
    </div>
    <div class="crop-canvas-wrap" id="crop-wrap">
      <img id="crop-img" src="" alt="" draggable="false" />
      <div class="crop-box" id="crop-box">
        <div class="crop-box-corner tl"></div>
        <div class="crop-box-corner tr"></div>
        <div class="crop-box-corner bl"></div>
        <div class="crop-box-corner br"></div>
      </div>
    </div>
    <div class="zoom-bar">
      <span class="zoom-label">zoom</span>
      <input type="range" class="zoom-slider" id="zoom-slider" min="100" max="400" value="100" oninput="onZoom(this.value)" />
      <span class="zoom-label" id="zoom-val">1×</span>
    </div>
    <div class="crop-hint">drag to pan · slider to zoom</div>
    <div class="crop-actions">
      <button class="crop-btn-cancel" onclick="closeCrop()">Cancel</button>
      <button class="crop-btn-apply" onclick="applyCrop()">✓ Apply Crop</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  step: 0,   // 0,1,2 = steps; 3 = done
  leverSwung: false,
  dropped: false,
  data: {
    name: '', class: '', stream: '', school: '',
    photo: '', exam: '', bio: ''
  }
};

// ─── SVG Gear ─────────────────────────────────────────────────────────────────
function gearSVG(size, teeth, color, angle) {
  const r = size / 2;
  const toothLen = size * 0.18;
  let rects = '';
  for (let i = 0; i < teeth; i++) {
    const a = (i / teeth) * 360;
    const aRad = (a * Math.PI) / 180;
    const px = 50 + (r + toothLen) * Math.cos(aRad);
    const py = 50 + (r + toothLen) * Math.sin(aRad);
    rects += `<rect x="${px-4}" y="${py-5}" width="8" height="10" rx="2" fill="var(${color})" transform="rotate(${a},${px},${py})"/>`;
  }
  return `<svg width="${size+20}" height="${size+20}" viewBox="0 0 100 100"
    style="transform:rotate(${angle}deg);transition:transform 0.05s linear;overflow:visible;display:block;">
    ${rects}
    <circle cx="50" cy="50" r="${r}" fill="var(--surface2)" stroke="var(${color})" stroke-width="3"/>
    <circle cx="50" cy="50" r="${r*0.35}" fill="var(--surface)" stroke="var(${color})" stroke-width="2"/>
  </svg>`;
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function pulleyScene(progress) {
  const ropeLen = 24 + progress * 18;
  const weightOffset = progress * 18;
  const wheelAngle = progress * 720;
  const spokes = [0,60,120,180,240,300].map(a =>
    `<div class="pulley-spoke" style="transform:translate(-50%,-50%) rotate(${a}deg);top:50%;left:50%;position:absolute;"></div>`
  ).join('');
  return `
  <div class="pulley-scene">
    <div class="pulley-rope-left">
      <div style="height:8px"></div>
      <div class="pulley-rope" style="height:${ropeLen}px"></div>
      <div class="pulley-weight" style="transform:translateY(${weightOffset}px)">W</div>
    </div>
    <div class="pulley-wheel-wrap">
      <div class="pulley-wheel" style="transform:rotate(${wheelAngle}deg)">${spokes}</div>
    </div>
    <div class="pulley-rope-right">
      <div style="height:8px"></div>
      <div class="pulley-rope" style="height:${Math.max(6, 42-weightOffset)}px"></div>
      <div class="pulley-weight" style="transform:translateY(${-weightOffset}px);background:linear-gradient(135deg,var(--pink),#d63880)">W</div>
    </div>
  </div>`;
}

function gearsScene(angle) {
  return `<div class="gears-scene">
    ${gearSVG(42,10,'--purple', angle)}
    ${gearSVG(28,7,'--pink', -angle*1.5)}
    ${gearSVG(20,5,'--teal', angle*2.1)}
  </div>`;
}

function photoScene(dropped) {
  const blades = [1,2,3,4].map(() =>
    `<div class="shutter-blade ${dropped ? 'open' : ''}"></div>`
  ).join('');
  return `<div class="photo-scene">
    <div class="ball ${dropped ? 'dropped' : ''}"></div>
    <div class="shutter">${blades}</div>
  </div>`;
}

function liquidScene(fillPct) {
  const pinkPct = Math.min(100, fillPct * 0.7);
  return `<div class="liquid-scene">
    <div>
      <div class="flask">
        <div class="flask-fill" style="height:${fillPct}%"></div>
        <div class="flask-bubble"></div>
        <div class="flask-bubble"></div>
        <div class="flask-bubble"></div>
      </div>
      <div class="flask-label">${Math.round(fillPct)}%</div>
    </div>
    <div>
      <div class="flask">
        <div class="flask-fill pink-fill" style="height:${pinkPct}%"></div>
        <div class="flask-bubble"></div>
      </div>
      <div class="flask-label" style="color:var(--pink)">${Math.round(pinkPct)}%</div>
    </div>
  </div>`;
}

function leverScene(swung) {
  return `<div class="lever-scene">
    <div class="lever-base">
      <div class="lever-pivot"></div>
      <div class="lever-arm ${swung ? 'swung' : ''}">
        <div class="lever-ball"></div>
      </div>
    </div>
  </div>`;
}

// ─── Pills helper ─────────────────────────────────────────────────────────────
function pills(options, field, selectedVal) {
  return options.map(opt =>
    `<div class="sos-pill ${selectedVal === opt ? 'selected' : ''}"
      onclick="selectPill('${field}','${opt}')">${opt}</div>`
  ).join('');
}

// ─── Step renderers ───────────────────────────────────────────────────────────
function renderStep1() {
  const d = state.data;
  const nameProgress = Math.min(1, (d.name.length || 0) / 15);
  const gearAngle = ((d.class ? 120 : 0) + (d.stream ? 80 : 0) + (d.school.length || 0) * 3) % 360;

  return `
    <div class="sos-machine">
      <div class="sos-machine-label">⚙ mechanism // name input → pulley</div>
      ${pulleyScene(nameProgress)}
    </div>
    <div class="sos-field" style="margin-top:18px">
      <label class="sos-label">// your name</label>
      <input class="sos-input" id="inp-name" placeholder="e.g. Aarav Shah" value="${escHtml(d.name)}"
        oninput="updateField('name',this.value)" />
    </div>
    <div class="sos-machine" style="margin-top:4px">
      <div class="sos-machine-label">⚙ mechanism // selection → gears</div>
      ${gearsScene(gearAngle)}
    </div>
    <div class="sos-field" style="margin-top:18px">
      <label class="sos-label">// class</label>
      <div class="sos-pills">${pills(['11','12'],'class',d.class)}</div>
    </div>
    <div class="sos-field">
      <label class="sos-label">// stream</label>
      <div class="sos-pills">${pills(['PCB','PCM','Commerce','Arts'],'stream',d.stream)}</div>
    </div>
    <div class="sos-field">
      <label class="sos-label">// school name</label>
      <input class="sos-input" id="inp-school" placeholder="e.g. DPS RK Puram" value="${escHtml(d.school)}"
        oninput="updateField('school',this.value)" />
    </div>`;
}

function renderStep2() {
  const d = state.data;
  return `
    <div class="sos-machine">
      <div class="sos-machine-label">⚙ mechanism // photo upload → shutter drop</div>
      ${photoScene(state.dropped)}
    </div>
    <div class="sos-field" style="margin-top:18px">
      <label class="sos-label">// profile photo <span style="color:var(--teal);font-size:0.6rem">· tap to upload &amp; crop</span></label>
      <div class="photo-upload-zone ${d.photo ? 'has-photo' : ''}" onclick="document.getElementById('file-inp').click()">
        <input type="file" id="file-inp" accept="image/*" onchange="handlePhoto(this)" />
        ${d.photo
          ? `<img src="${d.photo}" alt="preview" class="photo-preview"/><div class="photo-upload-text">tap to change</div>`
          : `<div class="photo-upload-icon">📸</div><div class="photo-upload-text">tap to upload profile photo</div>`
        }
      </div>
    </div>`;
}

function renderStep3() {
  const d = state.data;
  const bioLen = d.bio.length;
  const fillPct = Math.min(100, (bioLen / 200) * 100);
  const exams = ['NEET 2025','NEET 2026','AIIMS','JIPMER','JEE Main','JEE Advanced','CUET'];
  return `
    <div class="sos-field">
      <label class="sos-label">// target exam</label>
      <div class="sos-pills">${pills(exams,'exam',d.exam)}</div>
    </div>
    <div class="sos-machine" style="margin-top:4px">
      <div class="sos-machine-label">⚙ mechanism // bio length → flask fill</div>
      ${liquidScene(fillPct)}
    </div>
    <div class="sos-field" style="margin-top:18px">
      <label class="sos-label">// motivation / bio <span style="color:var(--teal)">${bioLen}/200</span></label>
      <textarea class="sos-input" placeholder="What drives you to study? What's your dream?"
        oninput="updateBio(this.value)">${escHtml(d.bio)}</textarea>
    </div>`;
}

function renderDone() {
  const d = state.data;
  const photoHtml = d.photo
    ? `<img src="${d.photo}" alt="" style="width:48px;height:48px;border-radius:50%;float:right;margin-left:8px;border:2px solid var(--pink)">`
    : '';
  return `
    <div class="sos-done">
      <div class="sos-done-icon">🚀</div>
      <div class="sos-done-title">System Initialized</div>
      <div class="sos-done-sub">
        Welcome, ${escHtml(d.name || 'Scholar')}.<br>
        Target locked: <span style="color:var(--pink)">${escHtml(d.exam || 'your exam')}</span><br>
        The machine is ready. Let's build something great.
      </div>
      <div class="sos-done-card">
        ${photoHtml}
        <span style="color:var(--purple)">name:</span> ${escHtml(d.name)}<br>
        <span style="color:var(--purple)">class:</span> ${escHtml(d.class)} · <span style="color:var(--purple)">stream:</span> ${escHtml(d.stream)}<br>
        <span style="color:var(--purple)">school:</span> ${escHtml(d.school)}<br>
        <span style="color:var(--purple)">exam:</span> ${escHtml(d.exam)}<br>
        ${d.bio ? `<span style="color:var(--purple)">bio:</span> ${escHtml(d.bio)}` : ''}
      </div>
    </div>`;
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const stepLabels = ['Identity','Photo','Mission'];
  const s = state.step;

  if (s === 3) {
    app.innerHTML = renderDone();
    return;
  }

  // Step dots
  let dotsHtml = '';
  stepLabels.forEach((label, i) => {
    let cls = '';
    if (i === s) cls = 'active';
    else if (i < s) cls = 'done';
    dotsHtml += `<div class="sos-step-dot ${cls}" title="${label}"></div>`;
    if (i < stepLabels.length - 1) {
      const fillW = s > i ? '100%' : '0%';
      dotsHtml += `<div class="sos-step-line"><div class="sos-step-line-fill" style="width:${fillW}"></div></div>`;
    }
  });

  let stepContent = '';
  if (s === 0) stepContent = renderStep1();
  if (s === 1) stepContent = renderStep2();
  if (s === 2) stepContent = renderStep3();

  const leverHtml = s === 2 ? `
    <div class="sos-machine" style="margin-top:20px">
      <div class="sos-machine-label">⚙ mechanism // submit → lever swing</div>
      ${leverScene(state.leverSwung)}
    </div>` : '';

  const btnLabel = s < 2 ? `Next → ${stepLabels[s+1]}` : '⚡ Let\'s Go';
  const canNext = checkCanNext();

  app.innerHTML = `
    <div class="sos-tagline">// onboarding_sequence.init</div>
    <div class="sos-steps">${dotsHtml}</div>
    <div class="sos-card">
      <div class="sos-section-title">step_${s+1} // ${stepLabels[s].toLowerCase()}</div>
      ${stepContent}
      ${leverHtml}
      <button class="sos-btn" onclick="handleNext()" ${canNext ? '' : 'disabled'}>${btnLabel}</button>
    </div>
    <div class="step-footer">step ${s+1} of 3 · studyos v0.1</div>`;
}

// ─── Logic ────────────────────────────────────────────────────────────────────
function checkCanNext() {
  const d = state.data;
  if (state.step === 0) return d.name && d.class && d.stream && d.school;
  if (state.step === 1) return true;
  if (state.step === 2) return !!d.exam;
  return false;
}

function handleNext() {
  if (state.step < 2) {
    state.step++;
    render();
  } else {
    state.leverSwung = true;
    render(); // show swung lever
    setTimeout(() => { state.step = 3; render(); }, 700);
  }
}

function selectPill(field, value) {
  state.data[field] = value;
  render();
}

function updateField(field, value) {
  state.data[field] = value;
  // Only re-render the animated parts, not the whole card (to avoid losing focus)
  softRenderMachines();
}

function updateBio(value) {
  state.data.bio = value.slice(0, 200);
  softRenderMachines();
}

function handlePhoto(input) {
  const f = input.files[0];
  if (!f) return;
  const url = URL.createObjectURL(f);
  openCrop(url);
}

// ─── Crop System ─────────────────────────────────────────────────────────────
const crop = {
  ratio: '1:1',
  zoom: 1,
  imgW: 0, imgH: 0,
  imgX: 0, imgY: 0,
  wrapW: 0, wrapH: 0,
  boxX: 0, boxY: 0,
  boxW: 0, boxH: 0,
  dragging: false,
  lastX: 0, lastY: 0,
  srcUrl: ''
};

function openCrop(url) {
  crop.srcUrl = url;
  crop.zoom = 1;
  crop.ratio = '1:1';
  const overlay = document.getElementById('crop-overlay');
  const img = document.getElementById('crop-img');
  overlay.style.display = 'flex';
  img.onload = () => {
    crop.imgW = img.naturalWidth;
    crop.imgH = img.naturalHeight;
    const wrap = document.getElementById('crop-wrap');
    crop.wrapW = wrap.clientWidth;
    crop.wrapH = wrap.clientHeight;
    initCropLayout();
    updateCropDisplay();
    updateRatioBtns();
  };
  img.src = url;
  document.getElementById('zoom-slider').value = 100;
  document.getElementById('zoom-val').textContent = '1×';
  setupCropDrag();
}

function closeCrop() {
  document.getElementById('crop-overlay').style.display = 'none';
}

function setRatio(r) {
  crop.ratio = r;
  initCropLayout();
  updateCropDisplay();
  updateRatioBtns();
}

function updateRatioBtns() {
  document.querySelectorAll('.crop-ratio-btn').forEach(b => b.classList.remove('active'));
  const map = {'1:1':0,'1:4':1,'19:6':2,'free':3};
  const btns = document.querySelectorAll('.crop-ratio-btn');
  if (btns[map[crop.ratio]]) btns[map[crop.ratio]].classList.add('active');
}

function onZoom(val) {
  crop.zoom = val / 100;
  document.getElementById('zoom-val').textContent = crop.zoom.toFixed(1) + '×';
  clampImg();
  updateCropDisplay();
}

function initCropLayout() {
  const wW = crop.wrapW, wH = crop.wrapH;
  let bW, bH;
  if (crop.ratio === '1:1')  { bW = Math.min(wW, wH) * 0.75; bH = bW; }
  else if (crop.ratio === '1:4') { bH = wH * 0.8; bW = bH / 4; }
  else if (crop.ratio === '19:6') { bW = wW * 0.85; bH = bW * 6/19; }
  else { bW = wW * 0.75; bH = wH * 0.65; } // free

  crop.boxW = bW; crop.boxH = bH;
  crop.boxX = (wW - bW) / 2;
  crop.boxY = (wH - bH) / 2;

  // Fit image to fill box at zoom=1
  const scaleW = bW / crop.imgW;
  const scaleH = bH / crop.imgH;
  const baseScale = Math.max(scaleW, scaleH);
  crop._baseScale = baseScale;
  crop.zoom = 1;
  document.getElementById('zoom-slider').value = 100;
  document.getElementById('zoom-val').textContent = '1×';

  const dispW = crop.imgW * baseScale;
  const dispH = crop.imgH * baseScale;
  crop.imgX = crop.boxX + (bW - dispW) / 2;
  crop.imgY = crop.boxY + (bH - dispH) / 2;
}

function clampImg() {
  const scale = crop._baseScale * crop.zoom;
  const dispW = crop.imgW * scale;
  const dispH = crop.imgH * scale;
  // Image must cover box
  if (crop.imgX > crop.boxX) crop.imgX = crop.boxX;
  if (crop.imgY > crop.boxY) crop.imgY = crop.boxY;
  if (crop.imgX + dispW < crop.boxX + crop.boxW) crop.imgX = crop.boxX + crop.boxW - dispW;
  if (crop.imgY + dispH < crop.boxY + crop.boxH) crop.imgY = crop.boxY + crop.boxH - dispH;
}

function updateCropDisplay() {
  const scale = crop._baseScale * crop.zoom;
  const img = document.getElementById('crop-img');
  const box = document.getElementById('crop-box');
  img.style.left = crop.imgX + 'px';
  img.style.top  = crop.imgY + 'px';
  img.style.width  = (crop.imgW * scale) + 'px';
  img.style.height = (crop.imgH * scale) + 'px';
  box.style.left   = crop.boxX + 'px';
  box.style.top    = crop.boxY + 'px';
  box.style.width  = crop.boxW + 'px';
  box.style.height = crop.boxH + 'px';
}

function setupCropDrag() {
  const wrap = document.getElementById('crop-wrap');
  // Remove old listeners by cloning
  const newWrap = wrap.cloneNode(true);
  wrap.parentNode.replaceChild(newWrap, wrap);
  // Re-query after replace
  const w = document.getElementById('crop-wrap');

  let startX, startY, startImgX, startImgY;

  function onStart(ex, ey) {
    crop.dragging = true;
    startX = ex; startY = ey;
    startImgX = crop.imgX; startImgY = crop.imgY;
  }
  function onMove(ex, ey) {
    if (!crop.dragging) return;
    crop.imgX = startImgX + (ex - startX);
    crop.imgY = startImgY + (ey - startY);
    clampImg();
    updateCropDisplay();
  }
  function onEnd() { crop.dragging = false; }

  w.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, e.clientY); });
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onEnd);

  w.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  w.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  w.addEventListener('touchend', onEnd);
}

function applyCrop() {
  const scale = crop._baseScale * crop.zoom;
  // Source coords: where crop box maps back to original image
  const srcX = (crop.boxX - crop.imgX) / scale;
  const srcY = (crop.boxY - crop.imgY) / scale;
  const srcW = crop.boxW / scale;
  const srcH = crop.boxH / scale;

  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(srcW);
  canvas.height = Math.round(srcH);
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);
    const result = canvas.toDataURL('image/jpeg', 0.92);
    state.data.photo = result;
    state.dropped = false;
    closeCrop();
    render();
    setTimeout(() => { state.dropped = true; render(); }, 50);
  };
  img.src = crop.srcUrl;
}

// Soft re-render: only update machine scenes + button state without touching focused inputs
function softRenderMachines() {
  const d = state.data;
  const s = state.step;

  if (s === 0) {
    const nameProgress = Math.min(1, (d.name.length || 0) / 15);
    const gearAngle = ((d.class ? 120 : 0) + (d.stream ? 80 : 0) + (d.school.length || 0) * 3) % 360;
    const machines = document.querySelectorAll('.sos-machine');
    if (machines[0]) machines[0].innerHTML = `<div class="sos-machine-label">⚙ mechanism // name input → pulley</div>${pulleyScene(nameProgress)}`;
    if (machines[1]) machines[1].innerHTML = `<div class="sos-machine-label">⚙ mechanism // selection → gears</div>${gearsScene(gearAngle)}`;
  }

  if (s === 2) {
    const bioLen = d.bio.length;
    const fillPct = Math.min(100, (bioLen / 200) * 100);
    const machine = document.querySelector('.sos-machine');
    if (machine) machine.innerHTML = `<div class="sos-machine-label">⚙ mechanism // bio length → flask fill</div>${liquidScene(fillPct)}`;
    // Update bio counter label
    const label = document.querySelector('.sos-label span');
    if (label) label.textContent = `${bioLen}/200`;
    // Sync textarea value if needed (avoid cursor jump)
    const ta = document.querySelector('textarea.sos-input');
    if (ta && ta.value !== d.bio) ta.value = d.bio;
  }

  // Update button disabled state
  const btn = document.querySelector('.sos-btn');
  if (btn) btn.disabled = !checkCanNext();
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
