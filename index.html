// ─── HELPERS ─────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().split("T")[0];
const todayLabel = () => new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "short" });
const getStreak = (logs) => {
  let streak = 0; const d = new Date();
  while (true) { const key = d.toISOString().split("T")[0]; if (logs[key]) { streak++; d.setDate(d.getDate() - 1); } else break; }
  return streak;
};
const getWeekDays = () => Array.from({ length: 7 }, (_, i) => { const d = new Date(); d.setDate(d.getDate() - 6 + i); return d.toISOString().split("T")[0]; });

// ─── CSS ──────────────────────────────────────────────────────────────────────

  const t = THEMES[theme] || THEMES.dark_purple;
  const vars = Object.entries(t).filter(([k]) => k.startsWith('--')).map(([k,v]) => `${k}:${v}`).join(';');
  return `
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{${vars};
    --green:#10b981;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;--pink:#ec4899;
    --radius:16px;--radius-sm:10px;--radius-lg:24px;
    --shadow:0 8px 32px #00000060;
    --sidebar:260px;
    font-family:'DM Sans',sans-serif;
  }
  html,body,#root{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
  h1,h2,h3,h4,.font-syne{font-family:'Syne',sans-serif}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

  @keyframes glow{0%,100%{box-shadow:0 0 20px var(--accentglow)}50%{box-shadow:0 0 40px var(--accentglow),0 0 60px var(--accentglow)}}

  .toggle{width:40px;height:22px;border-radius:99px;border:none;cursor:pointer;transition:background .2s;position:relative;flex-shrink:0}

  .ring-chart{position:relative;display:inline-flex;align-items:center;justify-content:center}

  .profile-avatar-lg{width:96px;height:96px;border-radius:20px;border:3px solid var(--accent);overflow:hidden;margin:0 auto 16px;background:var(--bg4);display:flex;align-items:center;justify-content:center}

  .stat-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:99px;background:var(--bg3);border:1px solid var(--border);font-size:13px;font-weight:600}

  .toggle{width:46px;height:26px;border-radius:99px;border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;outline:none}

  /* Focus ring pulse */
  @keyframes focusPulse{0%,100%{box-shadow:0 0 0 0 var(--accentglow)}50%{box-shadow:0 0 0 12px transparent}}
  `;

// ─── RING CHART ───────────────────────────────────────────────────────────────
function RingChart({ percent, color, size = 80, label, sub }) {
  const r = (size / 2) - 8;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return (
    <div className="ring-chart" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg4)" strokeWidth="6" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s cubic-bezier(.16,1,.3,1)" }} />
      </svg>
      <div className="ring-chart-label">
        <div style={{ fontFamily: "Syne", fontWeight: 800, fontSize: size/4, lineHeight: 1 }}>{percent}%</div>
        {sub && <div style={{ fontSize: 9, color: "var(--text3)", marginTop: 2 }}>{sub}</div>}
      </div>
    </div>
  );
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ name: "", class: "12", stream: "PCB", target: "NEET 2025", school: "", avatar: null, bio: "" });
  const fileRef = useRef();
  const handleAvatar = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setData(d => ({ ...d, avatar: ev.target.result }));
    reader.readAsDataURL(file);
  };
  return (
    <div className="onboard">
      <div className="onboard-card">
        <div className="step-dots">{[0,1,2].map(i => <div key={i} className={`step-dot ${step===i?"active":""}`}/>)}</div>
        {step === 0 && (
          <div className="fade-up">
            <div style={{ textAlign:"center", marginBottom:28 }}>
              <div style={{ width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,var(--accent),var(--pink))",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 8px 32px var(--accentglow)" }}>
                <Icon d={icons.brain} size={28} stroke="#fff" />
              </div>
              <h2 style={{ fontFamily:"Syne",fontSize:26,fontWeight:800,marginBottom:8 }}>StudyOS</h2>
              <p style={{ color:"var(--text3)",fontSize:14,lineHeight:1.6 }}>Your personal high-performance tracker for Class 12 PCB. Built to beat distractions, not just manage them.</p>
            </div>
            <button className="btn btn-primary" style={{ width:"100%",justifyContent:"center",padding:14 }} onClick={() => setStep(1)}>Set Up Your Profile →</button>
          </div>
        )}
        {step === 1 && (
          <div className="fade-up">
            <h3 style={{ fontFamily:"Syne",fontSize:18,fontWeight:700,marginBottom:20 }}>About You</h3>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div>
                <div className="avatar-upload" onClick={() => fileRef.current.click()}>
                  {data.avatar ? <img src={data.avatar} alt="avatar" /> : <><Icon d={icons.camera} size={24} stroke="var(--text3)" /><div style={{ fontSize:11,color:"var(--text3)",marginTop:6 }}>Upload Photo</div></>}
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleAvatar} />
              </div>
              <div><label className="label">Your Name</label><input className="input" placeholder="e.g. Aryan Sharma" value={data.name} onChange={e => setData(d => ({ ...d, name: e.target.value }))} /></div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <div><label className="label">Class</label><select className="input" value={data.class} onChange={e => setData(d => ({ ...d, class: e.target.value }))}><option>11</option><option>12</option></select></div>
                <div><label className="label">Stream</label><select className="input" value={data.stream} onChange={e => setData(d => ({ ...d, stream: e.target.value }))}><option>PCB</option><option>PCM</option><option>PCMB</option></select></div>
              </div>
              <div><label className="label">School</label><input className="input" placeholder="School name" value={data.school} onChange={e => setData(d => ({ ...d, school: e.target.value }))} /></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setStep(0)}>← Back</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={() => data.name && setStep(2)} disabled={!data.name}>Continue →</button>
            </div>
          </div>
        )}
        {step === 2 && (
          <div className="fade-up">
            <h3 style={{ fontFamily:"Syne",fontSize:18,fontWeight:700,marginBottom:8 }}>Your Target</h3>
            <p style={{ color:"var(--text3)",fontSize:13,marginBottom:20 }}>What are you preparing for?</p>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div><label className="label">Target Exam</label>
                <select className="input" value={data.target} onChange={e => setData(d => ({ ...d, target: e.target.value }))}>
                  <option>NEET 2025</option><option>NEET 2026</option><option>AIIMS</option><option>JEE Main</option><option>JEE Advanced</option><option>Boards Only</option>
                </select>
              </div>
              <div><label className="label">Bio / Motivation</label><textarea className="notes-area" style={{ minHeight:80 }} placeholder="Why are you doing this? Write your reason..." value={data.bio} onChange={e => setData(d => ({ ...d, bio: e.target.value }))} /></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setStep(1)}>← Back</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={() => onComplete(data)}>🚀 Let's Go!</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── HOME PAGE ────────────────────────────────────────────────────────────────
function HomePage({ profile, habits, habitLogs, setHabitLogs, lectures, lectureProgress, workoutLogs, goals }) {
  const todayKey = today();
  const todayLog = habitLogs[todayKey] || {};
  const habitsDone = habits.filter(h => todayLog[h.id]).length;
  const workoutDone = !!workoutLogs[todayKey]?.done;
  const lecturesDone = lectures.filter(l => lectureProgress[l.id]?.[todayKey]?.done).length;
  const goalsAvg = goals.length ? Math.round(goals.reduce((s,g) => s+g.progress,0)/goals.length) : 0;
  const streak = getStreak(workoutLogs);
  const toggleHabit = (id) => setHabitLogs(prev => ({ ...prev, [todayKey]: { ...(prev[todayKey]||{}), [id]: !prev[todayKey]?.[id] } }));
  const now = new Date(); const currentTotal = now.getHours()*60 + now.getMinutes();
  const currentSchedule = SCHEDULE.find((item,i) => {
    const [h,m] = item.time.split(":").map(Number); const t = h*60+(m||0);
    const next = SCHEDULE[i+1]; if (!next) return currentTotal >= t;
    const [nh,nm] = next.time.split(":").map(Number); const nt = nh*60+(nm||0);
    return currentTotal>=t && currentTotal<nt;
  });
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="card fade-up" style={{ background:"linear-gradient(135deg,var(--accentglow),var(--bg2))",border:"1px solid var(--border)" }}>
        <div style={{ display:"flex",alignItems:"center",gap:14 }}>
          <div className="profile-avatar" style={{ width:52,height:52,borderRadius:14,flexShrink:0 }}>
            {profile.avatar ? <img src={profile.avatar} alt="p" /> : <span style={{ fontSize:22 }}>🧑‍🎓</span>}
          </div>
          <div>
            <div style={{ fontFamily:"Syne",fontSize:20,fontWeight:800 }}>Good {now.getHours()<12?"Morning":now.getHours()<17?"Afternoon":"Evening"}, {profile.name?.split(" ")[0] || "Student"}! 👋</div>
            <div style={{ color:"var(--text3)",fontSize:13,marginTop:2 }}>{todayLabel()} • {profile.target}</div>
          </div>
        </div>
        {currentSchedule && (
          <div style={{ marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10 }}>
            <span style={{ fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600 }}>NOW:</span>
            <span style={{ fontSize:14,fontWeight:600,color:"var(--accent2)" }}>{currentSchedule.label}</span>
            <span style={{ fontSize:10,background:"var(--accentglow)",color:"var(--accent2)",padding:"2px 8px",borderRadius:99,fontWeight:700 }}>{currentSchedule.time}</span>
          </div>
        )}
      </div>
      <div className="grid-4 fade-up" style={{ animationDelay:".05s" }}>
        {[
          { label:"Habits Done", value:`${habitsDone}/${habits.length}`, color:"var(--green)", icon:icons.habits },
          { label:"Streak", value:`${streak}d 🔥`, color:"var(--red)", icon:icons.fire },
          { label:"Lectures", value:`${lecturesDone}/${lectures.length}`, color:"var(--blue)", icon:icons.lectures },
          { label:"Goals Avg", value:`${goalsAvg}%`, color:"var(--accent2)", icon:icons.goals },
        ].map((s,i) => (
          <div key={i} className="stat-card" style={{ animationDelay:`${i*.04}s` }}>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4 }}>
              <Icon d={s.icon} size={16} stroke={s.color} />
              <span style={{ fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600 }}>{s.label}</span>
            </div>
            <div className="stat-value" style={{ color:s.color,fontSize:20 }}>{s.value}</div>
          </div>
        ))}
      </div>
      <div className="grid-2 fade-up" style={{ animationDelay:".1s" }}>
        <div className="card">
          <div className="section-title"><Icon d={icons.habits} size={15} stroke="var(--green)" /> Today's Habits</div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {habits.slice(0,5).map(h => (
              <div key={h.id} className={`habit-item ${todayLog[h.id]?"done":""}`} onClick={() => toggleHabit(h.id)}>
                <div className="habit-check">{todayLog[h.id] && <Icon d={icons.check} size={13} stroke="#fff" strokeWidth={2.5}/>}</div>
                <span style={{ fontSize:16 }}>{h.emoji}</span>
                <span style={{ fontSize:13,fontWeight:500,flex:1,textDecoration:todayLog[h.id]?"line-through":"none",color:todayLog[h.id]?"var(--text3)":"var(--text)" }}>{h.name}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
          <div className="card">
            <div className="section-title"><Icon d={icons.goals} size={15} stroke="var(--accent2)" /> Goals</div>
            <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
              {goals.slice(0,3).map(g => (
                <div key={g.id}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12 }}>
                    <span style={{ fontWeight:600 }}>{g.emoji} {g.title}</span>
                    <span style={{ color:"var(--text3)" }}>{g.progress}%</span>
                  </div>
                  <div className="progress-bar"><div className="progress-fill" style={{ width:`${g.progress}%`,background:"linear-gradient(90deg,var(--accent),var(--accent2))" }}/></div>
                </div>
              ))}
            </div>
          </div>
          <div className="card" style={{ flex:1 }}>
            <div style={{ fontFamily:"Syne",fontWeight:700,marginBottom:10 }}>📊 Today's Progress</div>
            <div style={{ display:"flex",justifyContent:"space-around" }}>
              <RingChart percent={habits.length ? Math.round(habitsDone/habits.length*100) : 0} color="var(--green)" size={70} />
              <RingChart percent={lectures.length ? Math.round(lecturesDone/lectures.length*100) : 0} color="var(--blue)" size={70} />
              <RingChart percent={workoutDone ? 100 : 0} color="var(--red)" size={70} />
            </div>
            <div style={{ display:"flex",justifyContent:"space-around",marginTop:8 }}>
              {["Habits","Lectures","Workout"].map(l => <div key={l} style={{ fontSize:10,color:"var(--text3)",textAlign:"center" }}>{l}</div>)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SCHEDULE PAGE ────────────────────────────────────────────────────────────
function SchedulePage() {
  const currentHour = new Date().getHours(), currentMin = new Date().getMinutes();
  const currentTotal = currentHour * 60 + currentMin;
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="card fade-up" style={{ padding:"20px 24px" }}>
        <div style={{ fontSize:12,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".8px",fontWeight:600,marginBottom:4 }}>The Survivor Schedule</div>
        <div style={{ fontFamily:"Syne",fontSize:18,fontWeight:700 }}>Mon – Sat Daily Timeline</div>
        <div style={{ fontSize:13,color:"var(--text3)",marginTop:4 }}>20 hours committed • 4 hours free • 7 hours sleep</div>
      </div>
      <div className="card fade-up" style={{ animationDelay:".05s" }}>
        {SCHEDULE.map((item,i) => {
          const [h,m] = item.time.split(":").map(Number); const total = h*60+(m||0);
          const next = SCHEDULE[i+1];
          const nextTotal = next ? (() => { const [nh,nm] = next.time.split(":").map(Number); return nh*60+(nm||0); })() : 99999;
          const isCurrent = currentTotal>=total && currentTotal<nextTotal;
          return (
            <div key={i} className={`timeline-item ${isCurrent?"current":""}`}>
              <div className="timeline-time">{item.time}</div>
              <div className="timeline-dot" style={{ background:item.color+"20",color:item.color }}>
                <Icon d={icons[item.icon]||icons.timer} size={16} stroke={item.color} />
              </div>
              <div className="timeline-label" style={{ flex:1 }}>
                {item.label}
                {isCurrent && <span style={{ marginLeft:8,fontSize:10,background:"var(--accentglow)",color:"var(--accent2)",padding:"2px 8px",borderRadius:99,fontWeight:700 }}>NOW</span>}
              </div>
            </div>
          );
        })}
      </div>
      <div className="card fade-up" style={{ animationDelay:".2s",background:"linear-gradient(135deg,#3b82f618,#06b6d418)",border:"1px solid #3b82f630" }}>
        <div style={{ fontFamily:"Syne",fontWeight:700,marginBottom:8 }}>☀️ Sunday Reset Mode</div>
        <div style={{ fontSize:13,color:"var(--text3)",lineHeight:1.8 }}>06:00 Wake → 06:15 Full Workout → 07:45 Bio Revision → 10:00 Chem Revision → 12:00 Podcast → 14:00 Physics + PYQs → 16:00 Meal Prep → 18:00 Free Reading → 21:30 Sleep</div>
      </div>
    </div>
  );
}

// ─── HABITS PAGE ─────────────────────────────────────────────────────────────
function HabitsPage({ habits, setHabits, habitLogs, setHabitLogs }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newHabit, setNewHabit] = useState({ name:"", emoji:"✅", category:"morning" });
  const todayKey = today(); const todayLog = habitLogs[todayKey] || {};
  const toggleHabit = (id) => setHabitLogs(prev => ({ ...prev, [todayKey]: { ...(prev[todayKey]||{}), [id]: !prev[todayKey]?.[id] } }));
  const addHabit = () => { if (!newHabit.name) return; setHabits(prev => [...prev, { ...newHabit, id:Date.now(), target:1 }]); setNewHabit({ name:"", emoji:"✅", category:"morning" }); setShowAdd(false); };
  const deleteHabit = (id) => setHabits(prev => prev.filter(h => h.id !== id));
  const categories = [...new Set(habits.map(h => h.category))];
  const weekDays = getWeekDays();
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div>
          <div className="section-title" style={{ margin:0 }}><Icon d={icons.habits} size={16} stroke="var(--green)" /> Habit Tracker</div>
          <div style={{ fontSize:12,color:"var(--text3)",marginTop:2 }}>{habits.filter(h => todayLog[h.id]).length} of {habits.length} done today</div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(true)}><Icon d={icons.plus} size={14} stroke="#fff" /> Add Habit</button>
      </div>
      <div className="card fade-up">
        <div className="section-title">7-Day Overview</div>
        <div style={{ overflowX:"auto" }}>
          <div style={{ display:"grid",gridTemplateColumns:"1fr repeat(7,36px)",gap:6,alignItems:"center",minWidth:320 }}>
            <div style={{ fontSize:11,color:"var(--text3)" }}>Habit</div>
            {weekDays.map(d => <div key={d} style={{ textAlign:"center",fontSize:10,color:"var(--text3)",fontWeight:600 }}>{new Date(d+"T00:00").toLocaleDateString("en",{ weekday:"narrow" })}</div>)}
            {habits.map(h => <React.Fragment key={h.id}>
              <div style={{ fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{h.emoji} {h.name}</div>
              {weekDays.map(d => <div key={d} style={{ width:28,height:28,borderRadius:6,margin:"0 auto",background:habitLogs[d]?.[h.id]?"var(--green)":"var(--bg4)",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .2s" }}>{habitLogs[d]?.[h.id] && <Icon d={icons.check} size={12} stroke="#fff" strokeWidth={3}/>}</div>)}
            </React.Fragment>)}
          </div>
        </div>
      </div>
      {categories.map(cat => (
        <div key={cat} className="card fade-up">
          <div className="section-title" style={{ textTransform:"capitalize" }}>{cat}</div>
          <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
            {habits.filter(h => h.category===cat).map(h => (
              <div key={h.id} className={`habit-item ${todayLog[h.id]?"done":""}`}>
                <div onClick={() => toggleHabit(h.id)} style={{ display:"flex",alignItems:"center",gap:12,flex:1,cursor:"pointer" }}>
                  <div className="habit-check">{todayLog[h.id] && <Icon d={icons.check} size={14} stroke="#fff" strokeWidth={2.5}/>}</div>
                  <span style={{ fontSize:18 }}>{h.emoji}</span>
                  <span style={{ fontSize:13.5,fontWeight:500,textDecoration:todayLog[h.id]?"line-through":"none",color:todayLog[h.id]?"var(--text3)":"var(--text)" }}>{h.name}</span>
                </div>
                <button className="btn btn-icon btn-danger btn-sm" onClick={() => deleteHabit(h.id)}><Icon d={icons.trash} size={13} stroke="var(--red)"/></button>
              </div>
            ))}
          </div>
        </div>
      ))}
      {showAdd && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowAdd(false)}>
          <div className="modal">
            <div className="modal-title">Add New Habit</div>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div><label className="label">Emoji</label><input className="input" value={newHabit.emoji} onChange={e => setNewHabit(p => ({ ...p, emoji:e.target.value }))} /></div>
              <div><label className="label">Habit Name</label><input className="input" placeholder="e.g. 10 min meditation" value={newHabit.name} onChange={e => setNewHabit(p => ({ ...p, name:e.target.value }))} /></div>
              <div><label className="label">Category</label><select className="input" value={newHabit.category} onChange={e => setNewHabit(p => ({ ...p, category:e.target.value }))}><option>morning</option><option>fitness</option><option>discipline</option><option>health</option><option>study</option><option>evening</option></select></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setShowAdd(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={addHabit}>Add Habit</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── LECTURES PAGE ────────────────────────────────────────────────────────────
function LecturesPage({ lectures, setLectures, lectureProgress, setLectureProgress, notes, setNotes }) {
  const [showAdd, setShowAdd] = useState(false);
  const [selected, setSelected] = useState(null);
  const [newLec, setNewLec] = useState({ subject:"Biology", topic:"", teacher:"", time:"12:30", duration:120, color:"#10b981" });
  const todayKey = today();
  const toggleDone = (id) => setLectureProgress(prev => ({ ...prev, [id]: { ...(prev[id]||{}), [todayKey]: { ...(prev[id]?.[todayKey]||{}), done: !prev[id]?.[todayKey]?.done } } }));
  const addLec = () => { if (!newLec.subject) return; setLectures(prev => [...prev, { ...newLec, id:Date.now() }]); setNewLec({ subject:"Biology", topic:"", teacher:"", time:"12:30", duration:120, color:"#10b981" }); setShowAdd(false); };
  const saveNote = (lectureId, text) => setNotes(prev => ({ ...prev, [lectureId]: { ...(prev[lectureId]||{}), [todayKey]:text } }));
  const subjectColors = { Biology:"#10b981", Chemistry:"#f59e0b", Physics:"#3b82f6", Maths:"#8b5cf6" };
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div className="section-title" style={{ margin:0 }}><Icon d={icons.lectures} size={16} stroke="var(--blue)" /> Lecture Tracker</div>
        <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(true)}><Icon d={icons.plus} size={14} stroke="#fff" /> Add Class</button>
      </div>
      <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
        {lectures.map((l,i) => {
          const done = lectureProgress[l.id]?.[todayKey]?.done;
          const noteText = notes[l.id]?.[todayKey] || "";
          const isExpanded = selected === l.id;
          return (
            <div key={l.id} className="card fade-up" style={{ animationDelay:`${i*.04}s`,border:`1px solid ${done?l.color+"40":"var(--border)"}`,background:done?l.color+"08":"var(--bg2)" }}>
              <div style={{ display:"flex",gap:14,alignItems:"center" }}>
                <div style={{ width:48,height:48,borderRadius:12,background:l.color+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                  <Icon d={l.subject==="Biology"?icons.microscope:l.subject==="Chemistry"?icons.flask:l.subject==="Physics"?icons.atom:icons.book} size={22} stroke={l.color}/>
                </div>
                <div style={{ flex:1,minWidth:0 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap" }}>
                    <span style={{ fontFamily:"Syne",fontWeight:700,fontSize:15 }}>{l.subject}</span>
                    {done && <span className="badge" style={{ background:"#10b98120",color:"#10b981" }}>✓ Done</span>}
                  </div>
                  {l.topic && <div style={{ fontSize:12,color:"var(--text3)",marginBottom:4 }}>{l.topic}</div>}
                  <div style={{ display:"flex",gap:12,fontSize:11,color:"var(--text3)",flexWrap:"wrap" }}>
                    <span>🕐 {l.time}</span><span>⏱ {l.duration}min</span>{l.teacher&&<span>👨‍🏫 {l.teacher}</span>}
                  </div>
                </div>
                <div style={{ display:"flex",gap:8,alignItems:"center",flexShrink:0 }}>
                  <button className="btn btn-ghost btn-sm btn-icon" onClick={() => setSelected(isExpanded?null:l.id)}><Icon d={icons.notes} size={15} stroke="var(--text2)"/></button>
                  <button onClick={() => toggleDone(l.id)} className="btn btn-sm" style={{ background:done?"#10b98120":"var(--bg3)",color:done?"#10b981":"var(--text2)",border:`1px solid ${done?"#10b98140":"var(--border)"}` }}>{done?"✓ Done":"Mark Done"}</button>
                  <button className="btn btn-icon btn-danger btn-sm" onClick={() => setLectures(prev => prev.filter(x => x.id!==l.id))}><Icon d={icons.trash} size={13} stroke="var(--red)"/></button>
                </div>
              </div>
              {isExpanded && (
                <div style={{ marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)",animation:"fadeUp .2s ease" }}>
                  <label className="label">📝 Today's Notes — {l.subject}</label>
                  <textarea className="notes-area" placeholder="Write your notes, key points, doubts..." value={noteText} onChange={e => saveNote(l.id, e.target.value)} />
                  <div style={{ display:"flex",gap:8,marginTop:10,flexWrap:"wrap" }}>
                    <div style={{ flex:1,minWidth:160 }}>
                      <label className="label">Topic Covered</label>
                      <input className="input" placeholder="e.g. Photosynthesis" value={l.topic} onChange={e => setLectures(prev => prev.map(x => x.id===l.id?{...x,topic:e.target.value}:x))}/>
                    </div>
                    <div style={{ flex:1,minWidth:120 }}>
                      <label className="label">DPP Status</label>
                      <select className="input" value={lectureProgress[l.id]?.[todayKey]?.dpp||"pending"} onChange={e => setLectureProgress(prev => ({ ...prev, [l.id]: { ...(prev[l.id]||{}), [todayKey]: { ...(prev[l.id]?.[todayKey]||{}), dpp:e.target.value } } }))}>
                        <option value="pending">📋 Not Started</option><option value="started">🔄 In Progress</option><option value="done">✅ Completed</option>
                      </select>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {showAdd && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowAdd(false)}>
          <div className="modal">
            <div className="modal-title">Add New Class</div>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <div><label className="label">Subject</label><select className="input" value={newLec.subject} onChange={e => setNewLec(p => ({ ...p, subject:e.target.value, color:subjectColors[e.target.value]||"#7c6fff" }))}><option>Biology</option><option>Chemistry</option><option>Physics</option><option>Maths</option><option>English</option><option>Other</option></select></div>
                <div><label className="label">Teacher</label><input className="input" placeholder="Teacher name" value={newLec.teacher} onChange={e => setNewLec(p => ({ ...p, teacher:e.target.value }))}/></div>
              </div>
              <div><label className="label">Topic</label><input className="input" placeholder="Chapter / Topic" value={newLec.topic} onChange={e => setNewLec(p => ({ ...p, topic:e.target.value }))}/></div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <div><label className="label">Time</label><input className="input" type="time" value={newLec.time} onChange={e => setNewLec(p => ({ ...p, time:e.target.value }))}/></div>
                <div><label className="label">Duration (min)</label><input className="input" type="number" value={newLec.duration} onChange={e => setNewLec(p => ({ ...p, duration:+e.target.value }))}/></div>
              </div>
              <div><label className="label">Color</label><div style={{ display:"flex",gap:8 }}>{["#10b981","#f59e0b","#3b82f6","#8b5cf6","#ef4444","#ec4899"].map(c => <div key={c} onClick={() => setNewLec(p => ({ ...p, color:c }))} style={{ width:28,height:28,borderRadius:8,background:c,cursor:"pointer",border:newLec.color===c?"2px solid var(--text)":"2px solid transparent",transition:"transform .2s",transform:newLec.color===c?"scale(1.2)":"scale(1)" }}/>)}</div></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setShowAdd(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={addLec}>Add Class</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── WORKOUT PAGE ─────────────────────────────────────────────────────────────
function WorkoutPage({ exercises, setExercises, workoutLogs, setWorkoutLogs }) {
  const [showAdd, setShowAdd] = useState(false);
  const [sessionActive, setSessionActive] = useState(false);
  const [completed, setCompleted] = useState({});
  const [newEx, setNewEx] = useState({ name:"", sets:3, reps:10, unit:"reps", category:"chest" });
  const todayKey = today();
  const categories = ["chest","back","legs","shoulders","arms","core","cardio"];
  const grouped = categories.reduce((acc,cat) => { acc[cat]=exercises.filter(e => e.category===cat); return acc; },{});
  const finishWorkout = () => { setWorkoutLogs(prev => ({ ...prev, [todayKey]:{ done:true,exercises:completed,timestamp:Date.now() } })); setSessionActive(false); setCompleted({}); };
  const addEx = () => { if (!newEx.name) return; setExercises(prev => [...prev,{ ...newEx,id:Date.now() }]); setNewEx({ name:"",sets:3,reps:10,unit:"reps",category:"chest" }); setShowAdd(false); };
  const streak = getStreak(workoutLogs); const todayDone = workoutLogs[todayKey]?.done;
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="grid-3 fade-up">
        {[
          { label:"Current Streak", value:streak+" days", color:"var(--red)", icon:icons.fire },
          { label:"Total Exercises", value:exercises.length, color:"var(--blue)", icon:icons.dumbbell },
          { label:"Today", value:todayDone?"✓ Done":"Not Done", color:todayDone?"var(--green)":"var(--text3)", icon:icons.check },
        ].map((s,i) => (
          <div key={i} className="stat-card" style={{ animationDelay:`${i*.04}s` }}>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}>

              </div>

}

// ─── GOALS PAGE ───────────────────────────────────────────────────────────────
function GoalsPage({ goals, setGoals }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newGoal, setNewGoal] = useState({ title:"", emoji:"🎯", deadline:"", progress:0, category:"academic" });
  const addGoal = () => { if (!newGoal.title) return; setGoals(prev => [...prev,{ ...newGoal, id:Date.now() }]); setNewGoal({ title:"", emoji:"🎯", deadline:"", progress:0, category:"academic" }); setShowAdd(false); };
  const updateProgress = (id, val) => setGoals(prev => prev.map(g => g.id===id?{ ...g, progress:Math.max(0,Math.min(100,val)) }:g));
  const categoryColors = { academic:"var(--blue)", discipline:"var(--red)", fitness:"var(--green)", personal:"var(--accent2)" };
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div className="section-title" style={{ margin:0 }}><Icon d={icons.goals} size={16} stroke="var(--accent2)"/> Goals</div>
        <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(true)}><Icon d={icons.plus} size={14} stroke="#fff"/> Add Goal</button>

        {goals.map((g,i) => (

              <span style={{ fontSize:28 }}>{g.emoji}</span>
              <div style={{ flex:1,minWidth:0 }}>
                <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap" }}>
                  <div style={{ fontFamily:"Syne",fontWeight:700,fontSize:15 }}>{g.title}</div>
                  <span className="badge" style={{ background:categoryColors[g.category]+"20",color:categoryColors[g.category] }}>{g.category}</span>
                </div>
                {g.deadline && <div style={{ fontSize:11,color:"var(--text3)",marginBottom:10 }}>📅 Deadline: {g.deadline}</div>}
                <div className="progress-bar" style={{ marginBottom:8 }}>
                  <div className="progress-fill" style={{ width:`${g.progress}%`,background:`linear-gradient(90deg,var(--accent),var(--accent2))` }}/>
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                  <span style={{ fontSize:12,fontWeight:600,color:"var(--accent2)" }}>{g.progress}%</span>

            </div>

      {showAdd && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowAdd(false)}>
          <div className="modal">
            <div className="modal-title">Add New Goal</div>
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              <div style={{ display:"grid",gridTemplateColumns:"80px 1fr",gap:10 }}>
                <div><label className="label">Emoji</label><input className="input" value={newGoal.emoji} onChange={e => setNewGoal(p => ({ ...p, emoji:e.target.value }))}/></div>
                <div><label className="label">Goal Title</label><input className="input" placeholder="e.g. Clear NEET 2025" value={newGoal.title} onChange={e => setNewGoal(p => ({ ...p, title:e.target.value }))}/></div>
              </div>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                <div><label className="label">Category</label><select className="input" value={newGoal.category} onChange={e => setNewGoal(p => ({ ...p, category:e.target.value }))}><option>academic</option><option>fitness</option><option>discipline</option><option>personal</option></select></div>
                <div><label className="label">Deadline</label><input className="input" type="date" value={newGoal.deadline} onChange={e => setNewGoal(p => ({ ...p, deadline:e.target.value }))}/></div>
              </div>
              <div><label className="label">Initial Progress: {newGoal.progress}%</label><input type="range" min="0" max="100" value={newGoal.progress} onChange={e => setNewGoal(p => ({ ...p, progress:+e.target.value }))} style={{ width:"100%",accentColor:"var(--accent)" }}/></div>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:20 }}>
              <button className="btn btn-ghost" style={{ flex:1,justifyContent:"center" }} onClick={() => setShowAdd(false)}>Cancel</button>
              <button className="btn btn-primary" style={{ flex:2,justifyContent:"center" }} onClick={addGoal}>Add Goal</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── NOTES PAGE ───────────────────────────────────────────────────────────────
function NotesPage({ notes, setNotes, lectures }) {
  const [activeSubject, setActiveSubject] = useState(lectures[0]?.id || null);
  const todayKey = today();
  const subjects = lectures.map(l => ({ id:l.id, name:l.subject, color:l.color }));
  const allDates = activeSubject && notes[activeSubject] ? Object.keys(notes[activeSubject]).sort().reverse() : [];
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="section-title"><Icon d={icons.notes} size={16} stroke="var(--text2)"/> Notes</div>
      <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
        {subjects.map(s => (
          <button key={s.id} onClick={() => setActiveSubject(s.id)} style={{ padding:"6px 14px",borderRadius:99,fontSize:13,fontWeight:600,cursor:"pointer",border:`1px solid ${activeSubject===s.id?s.color+"60":"var(--border)"}`,background:activeSubject===s.id?s.color+"20":"var(--bg3)",color:activeSubject===s.id?s.color:"var(--text2)",transition:"all .2s" }}>{s.name}</button>
        ))}
      </div>
      {activeSubject && (
        <div className="card fade-up">
          <label className="label">Today's Note — {subjects.find(s => s.id===activeSubject)?.name}</label>
          <textarea className="notes-area" style={{ minHeight:180 }} placeholder="Write key points, doubts, formulas..." value={notes[activeSubject]?.[todayKey]||""} onChange={e => setNotes(prev => ({ ...prev, [activeSubject]:{ ...(prev[activeSubject]||{}), [todayKey]:e.target.value } }))}/>
        </div>
      )}
      {activeSubject && allDates.filter(d => d!==todayKey).length > 0 && (
        <div>
          <div className="section-title">Previous Notes</div>
          {allDates.filter(d => d!==todayKey).map(date => (
            <div key={date} className="card-sm" style={{ marginBottom:10,background:"var(--bg3)",borderRadius:12 }}>
              <div style={{ fontSize:11,color:"var(--text3)",fontWeight:600,marginBottom:6 }}>{new Date(date+"T00:00").toLocaleDateString("en-IN",{ weekday:"short",day:"numeric",month:"short" })}</div>
              <div style={{ fontSize:13,color:"var(--text2)",lineHeight:1.6,whiteSpace:"pre-wrap" }}>{notes[activeSubject][date]}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ANALYTICS PAGE ───────────────────────────────────────────────────────────
function AnalyticsPage({ habitLogs, habits, workoutLogs, lectureProgress, lectures }) {
  const weekDays = getWeekDays(); const maxBarH = 100;
  const habitData = weekDays.map(date => {
    const log = habitLogs[date]||{}; const done = habits.filter(h => log[h.id]).length;
    return { date, done, total:habits.length, pct:habits.length?Math.round(done/habits.length*100):0 };
  });
  const workoutData = weekDays.map(date => ({ date, done:!!workoutLogs[date]?.done }));
  const workoutStreak = getStreak(workoutLogs);
  const lectureData = weekDays.map(date => {
    const done = lectures.filter(l => lectureProgress[l.id]?.[date]?.done).length;
    return { date, done, total:lectures.length };
  });
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="section-title"><Icon d={icons.analytics} size={16} stroke="var(--text2)"/> Weekly Analytics</div>
      <div className="grid-3 fade-up">
        <div className="card" style={{ textAlign:"center" }}>
          <RingChart percent={habitData[6]?.pct||0} color="var(--green)" size={90}/>
          <div style={{ marginTop:12,fontFamily:"Syne",fontWeight:700,fontSize:14 }}>Habits Today</div>
          <div style={{ fontSize:12,color:"var(--text3)" }}>{habitData[6]?.done}/{habitData[6]?.total} done</div>
        </div>
        <div className="card" style={{ textAlign:"center" }}>
          <RingChart percent={lectures.length?Math.round((lectureData[6]?.done/lectures.length)*100):0} color="var(--blue)" size={90}/>
          <div style={{ marginTop:12,fontFamily:"Syne",fontWeight:700,fontSize:14 }}>Lectures Today</div>
          <div style={{ fontSize:12,color:"var(--text3)" }}>{lectureData[6]?.done}/{lectures.length} done</div>
        </div>
        <div className="card" style={{ textAlign:"center" }}>
          <RingChart percent={Math.min(100,workoutStreak*10)} color="var(--red)" size={90} sub="streak"/>
          <div style={{ marginTop:12,fontFamily:"Syne",fontWeight:700,fontSize:14 }}>Workout Streak</div>
          <div style={{ fontSize:12,color:"var(--text3)" }}>{workoutStreak} days</div>
        </div>
      </div>
      <div className="card fade-up" style={{ animationDelay:".1s" }}>
        <div className="section-title">Habit Completion — Last 7 Days<span style={{ marginLeft:"auto",fontSize:12,color:"var(--text3)",fontWeight:400 }}>{Math.round(habitData.reduce((s,d)=>s+d.pct,0)/7)}% avg</span></div>
        <div style={{ display:"flex",alignItems:"flex-end",gap:6,height:140,paddingBottom:20,paddingTop:20,position:"relative" }}>
          {habitData.map((d,i) => (
            <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:0,height:"100%",justifyContent:"flex-end" }}>
              <div style={{ fontSize:9,color:"var(--text3)",fontWeight:600,marginBottom:3,textAlign:"center" }}>{d.pct}%</div>
              <div style={{ width:"100%",height:`${Math.max(d.pct,2)}%`,maxHeight:"calc(100% - 36px)",background:d.pct===100?"var(--green)":d.pct>50?"var(--accent)":"var(--bg4)",borderRadius:"4px 4px 0 0",transition:"height 1s cubic-bezier(.16,1,.3,1)" }}/>
              <div style={{ fontSize:10,color:"var(--text3)",marginTop:4,textAlign:"center" }}>{new Date(d.date+"T00:00").toLocaleDateString("en",{ weekday:"narrow" })}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card fade-up" style={{ animationDelay:".15s" }}>
        <div className="section-title">Workout Heatmap — Last 7 Days</div>
        <div style={{ display:"flex",gap:8 }}>
          {workoutData.map((d,i) => (
            <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8 }}>
              <div style={{ width:"100%",aspectRatio:"1/1",borderRadius:8,background:d.done?"var(--green)":"var(--bg4)",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .3s" }}>
                {d.done && <Icon d={icons.check} size={16} stroke="#fff" strokeWidth={2.5}/>}
              </div>
              <div style={{ fontSize:10,color:"var(--text3)" }}>{new Date(d.date+"T00:00").toLocaleDateString("en",{ weekday:"narrow" })}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card fade-up" style={{ animationDelay:".2s" }}>
        <div className="section-title">Lectures Attended — Last 7 Days<span style={{ marginLeft:"auto",fontSize:12,color:"var(--text3)",fontWeight:400 }}>{weekDays.reduce((s,d)=>s+lectures.filter(l=>lectureProgress[l.id]?.[d]?.done).length,0)}/{weekDays.length*lectures.length} total</span></div>
        <div style={{ display:"flex",alignItems:"flex-end",gap:6,height:140,paddingBottom:20,paddingTop:20 }}>
          {lectureData.map((d,i) => (
            <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end" }}>
              <div style={{ fontSize:9,color:"var(--text3)",fontWeight:600,marginBottom:3,textAlign:"center" }}>{d.done}/{d.total}</div>
              <div style={{ width:"100%",height:d.total?`${Math.max((d.done/d.total)*100,d.done>0?2:0)}%`:"0%",maxHeight:"calc(100% - 36px)",background:"var(--blue)",borderRadius:"4px 4px 0 0",transition:"height 1s cubic-bezier(.16,1,.3,1)" }}/>
              <div style={{ fontSize:10,color:"var(--text3)",marginTop:4,textAlign:"center" }}>{new Date(d.date+"T00:00").toLocaleDateString("en",{ weekday:"narrow" })}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function ProfilePage({ profile, setProfile, habitLogs, habits, workoutLogs, lectureProgress, lectures, goals }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState(profile);
  const fileRef = useRef();
  const handleAvatar = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setForm(f => ({ ...f, avatar:ev.target.result }));
    reader.readAsDataURL(file);
  };
  const save = () => { setProfile(form); setEditing(false); };
  const weekDays = getWeekDays();
  const totalHabitDays = weekDays.filter(d => habits.some(h => habitLogs[d]?.[h.id])).length;
  const workoutStreak = getStreak(workoutLogs);
  const goalsAvg = goals.length ? Math.round(goals.reduce((s,g)=>s+g.progress,0)/goals.length):0;
  const lectureWeek = weekDays.reduce((s,d)=>s+lectures.filter(l=>lectureProgress[l.id]?.[d]?.done).length,0);
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
      <div className="profile-hero fade-up">
        <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleAvatar}/>
        <div className="profile-avatar-lg" onClick={() => editing && fileRef.current.click()} style={{ cursor:editing?"pointer":"default" }}>
          {(editing?form:profile).avatar ? <img src={(editing?form:profile).avatar} alt="avatar"/> : <Icon d={icons.user} size={40} stroke="var(--text3)"/>}
        </div>
        <div style={{ fontFamily:"Syne",fontSize:26,fontWeight:800,marginBottom:4 }}>{profile.name||"Student"}</div>
        <div style={{ color:"var(--text3)",fontSize:14,marginBottom:16 }}>Class {profile.class} {profile.stream} • {profile.target}</div>
        {profile.school && <div style={{ fontSize:13,color:"var(--text2)",marginBottom:12 }}>🏫 {profile.school}</div>}
        {profile.bio && <div style={{ fontSize:13,color:"var(--text3)",fontStyle:"italic",marginBottom:16,lineHeight:1.6,maxWidth:400,margin:"0 auto 16px" }}>"{profile.bio}"</div>}
        <button className="btn btn-ghost btn-sm" onClick={() => { setForm(profile); setEditing(!editing); }} style={{ margin:"0 auto" }}>
          <Icon d={icons.edit} size={14}/> {editing?"Cancel":"Edit Profile"}

      </div>
      {editing && (
        <div className="card fade-up">
          <div style={{ fontFamily:"Syne",fontWeight:700,fontSize:15,marginBottom:16 }}>Edit Profile</div>
          <div style={{ display:"flex",alignItems:"center",gap:16,marginBottom:20 }}>
            <div style={{ width:72,height:72,borderRadius:16,overflow:"hidden",background:"var(--bg4)",display:"flex",alignItems:"center",justifyContent:"center",border:"2px dashed var(--border2)",cursor:"pointer" }} onClick={() => fileRef.current.click()}>
              {form.avatar ? <img src={form.avatar} alt="p" style={{ width:"100%",height:"100%",objectFit:"cover" }}/> : <Icon d={icons.camera} size={20} stroke="var(--text3)"/>}
            </div>
            <button className="btn btn-ghost btn-sm" onClick={() => fileRef.current.click()}><Icon d={icons.upload} size={13}/> Change Photo</button>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14 }}>
            <div><label className="label">Name</label><input className="input" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
            <div><label className="label">School</label><input className="input" value={form.school||""} onChange={e=>setForm(f=>({...f,school:e.target.value}))}/></div>
            <div><label className="label">Class</label><select className="input" value={form.class||"12"} onChange={e=>setForm(f=>({...f,class:e.target.value}))}><option>11</option><option>12</option></select></div>
            <div><label className="label">Stream</label><select className="input" value={form.stream||"PCB"} onChange={e=>setForm(f=>({...f,stream:e.target.value}))}><option>PCB</option><option>PCM</option><option>PCMB</option></select></div>
            <div style={{ gridColumn:"span 2" }}><label className="label">Target Exam</label><select className="input" value={form.target||"NEET 2025"} onChange={e=>setForm(f=>({...f,target:e.target.value}))}><option>NEET 2025</option><option>NEET 2026</option><option>AIIMS</option><option>JEE Main</option><option>JEE Advanced</option><option>Boards Only</option></select></div>

// ─── WEEKLY REPORT PAGE ───────────────────────────────────────────────────────
function WeeklyReportPage({ profile, habits, habitLogs, workoutLogs, lectureProgress, lectures, goals }) {

  const avgHabit = Math.round(habitData.reduce((s,d)=>s+d.pct,0)/7);
  const workoutDone = weekDays.filter(d => workoutLogs[d]?.done).length;
  const lectureDone = weekDays.reduce((s,d)=>s+lectures.filter(l=>lectureProgress[l.id]?.[d]?.done).length,0);

  const fileRef = useRef();
  const importRef = useRef();

  const handleAvatar = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setForm(f => ({ ...f, avatar:ev.target.result }));
    reader.readAsDataURL(file);
  };

  const exportData = () => {
    const data = JSON.stringify(allData, null, 2);
    const blob = new Blob([data], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`StudyOS_backup_${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files[0]; if (!file) return;
    setImportError(""); setImportOk(false);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        onImport(data);
        setImportOk(true);
        setTimeout(() => setImportOk(false), 3000);
